<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GALAX</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
    canvas{display:block;position:fixed;top:0;left:0}
    #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 22px;pointer-events:none;z-index:20}
    .hud-block{display:flex;flex-direction:column;gap:3px}
    .hud-label{font-size:9px;letter-spacing:4px;color:rgba(180,220,255,0.45);text-transform:uppercase}
    .hud-value{font-size:20px;font-weight:bold;color:#b4e0ff;text-shadow:0 0 12px #4db8ff80;letter-spacing:2px}
    .hud-center{text-align:center;align-items:center}
    #lives-row{display:flex;gap:5px;margin-top:3px}
    .life-ship{opacity:1;transition:opacity .3s}
    .life-ship.dead{opacity:.12}
    #loop-stars{display:flex;gap:4px;margin-top:4px;justify-content:center}
    .loop-star{font-size:14px;color:#f5c842;text-shadow:0 0 8px #f5c842}
    #boss-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);width:min(380px,75vw);z-index:20;display:none}
    #boss-wrap.on{display:block}
    .boss-lbl{font-size:9px;letter-spacing:5px;color:#ff4488;text-shadow:0 0 8px #ff4488;margin-bottom:5px;text-align:center}
    .boss-track{height:6px;background:rgba(255,68,136,.15);border:1px solid rgba(255,68,136,.3);border-radius:3px;overflow:hidden}
    #boss-fill{height:100%;background:linear-gradient(90deg,#ff1466,#ff8800);border-radius:3px;transition:width .08s}
    #ann{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:40;opacity:0;transition:opacity .4s}
    #ann.show{opacity:1}
    .ann-sub{font-size:11px;letter-spacing:8px;color:rgba(255,255,255,.5);margin-bottom:10px}
    .ann-name{font-size:clamp(28px,6vw,52px);font-weight:900;letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 40px currentColor;padding:0 24px;text-align:center;word-break:break-word}
    #combo-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:22;opacity:0;transition:opacity .15s;text-align:center}
    #combo-pop.show{opacity:1}
    .combo-txt{font-size:clamp(12px,3vw,18px);color:#ffe44d;text-shadow:0 0 20px #ffe44d;letter-spacing:2px}
    #modal{position:fixed;inset:0;background:rgba(0,4,14,.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100}
    #modal.hide{display:none}
    .mbox{border:1px solid rgba(100,180,255,.18);background:linear-gradient(160deg,rgba(0,12,36,.97),rgba(0,4,18,.99));border-radius:16px;padding:clamp(20px,3vw,40px) clamp(20px,4vw,48px);text-align:center;max-width:480px;width:92%;box-shadow:0 0 80px rgba(40,110,255,.1),0 0 180px rgba(40,110,255,.05)}
    .m-label{font-size:9px;letter-spacing:3px;color:rgba(150,210,255,.8);text-transform:uppercase;margin-bottom:12px;font-family:'Press Start 2P',monospace}
    .m-title{font-size:clamp(18px,4.5vw,40px);font-weight:900;letter-spacing:2px;font-family:'Press Start 2P',monospace;color:#b4e0ff;text-shadow:0 0 30px #4db8ff,0 0 60px #4db8ff40;margin-bottom:5px;line-height:1.1;word-break:break-word}
    .m-sub{font-size:8px;letter-spacing:1px;color:rgba(160,215,255,.85);margin-bottom:28px;min-height:16px;line-height:1.8}
    .m-scores{margin-bottom:24px}
    .m-score-lbl{font-size:8px;letter-spacing:1px;color:rgba(180,220,255,.8);margin-bottom:8px}
    .m-score-val{font-size:clamp(18px,4vw,28px);color:#fff;letter-spacing:2px;text-shadow:0 0 16px #fff4;font-family:'Press Start 2P',monospace}
    .m-hi{font-size:8px;color:#f5c842;letter-spacing:1px;text-shadow:0 0 8px #f5c84270;margin-top:5px;min-height:16px}
    .m-btn{display:inline-block;background:rgba(0,80,160,.3);border:1.5px solid rgba(100,180,255,.7);color:#e8f6ff;font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:14px 32px;cursor:pointer;text-transform:uppercase;transition:all .2s;border-radius:6px;box-shadow:0 0 24px rgba(77,184,255,.2)}
    .m-btn:hover,.m-btn:active{border-color:#4db8ff;background:rgba(77,184,255,.18);box-shadow:0 0 28px rgba(77,184,255,.35);transform:scale(1.04)}
    .m-btn2{display:inline-block;background:transparent;border:1px solid rgba(100,180,255,.4);color:rgba(180,220,255,.75);font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;padding:10px 24px;cursor:pointer;text-transform:uppercase;transition:all .2s;border-radius:6px;margin-top:10px}
    .m-btn2:hover,.m-btn2:active{border-color:rgba(100,180,255,.7);color:#c8e8ff;background:rgba(77,184,255,.1)}
    .m-div{width:50px;height:1px;background:rgba(100,180,255,.12);margin:18px auto}
    .m-info{font-size:8px;letter-spacing:1px;color:rgba(160,210,255,.75);margin-top:14px;line-height:2}
    .m-lstars{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
    .m-lstars .ls{font-size:18px;color:#f5c842;text-shadow:0 0 10px #f5c842}
    #ctrl-btns{position:fixed;bottom:clamp(20px,5vh,40px);right:0;display:none;flex-direction:column;gap:0;z-index:30}
    #ctrl-btns.on{display:flex}
    .ctrl-btn{width:64px;height:64px;background:rgba(0,0,0,0.45);border:none;color:rgba(255,255,255,0.75);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent}
    @media(max-width:500px){.ctrl-btn{width:44px;height:44px;font-size:16px;}}
    .ctrl-btn:active{background:rgba(77,184,255,0.25)}
    #pause-overlay{position:fixed;inset:0;background:rgba(0,4,20,0.82);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;gap:32px}
    #pause-overlay.on{display:flex}
    #pause-overlay .p-title{font-family:'Press Start 2P',monospace;font-size:clamp(24px,5vw,40px);color:#4db8ff;text-shadow:0 0 20px #4db8ff}
    #pause-overlay .p-btn{font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:2px;padding:18px 40px;background:rgba(0,80,160,.4);border:1.5px solid rgba(100,180,255,.7);color:#e8f6ff;cursor:pointer;border-radius:6px;text-transform:uppercase;min-width:200px;min-height:64px}

  // Detectar idioma — URL param ?lang=xx tiene prioridad (Android WebView lo inyecta),
  // luego navigator.language, fallback inglés
  function detectLang(){
    const url = new URLSearchParams(window.location.search).get('lang');
    if(url) return url.split('-')[0].toLowerCase();
    const nav = (navigator.language||'en').split('-')[0].toLowerCase();
    return nav;
  }
  const LANG = detectLang();
  const T = TRANSLATIONS[LANG] || TRANSLATIONS['en'];
  function t(key, vars={}){
    let s = T[key] || TRANSLATIONS['en'][key] || key;
    for(const [k,v] of Object.entries(vars)) s = s.replaceAll('{'+k+'}', v);
    return s;
  }

  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    const dpr=Math.min(window.devicePixelRatio||1,3); // cap a 3x para no saturar
    C.width=Math.round(W*dpr); C.height=Math.round(H*dpr);
    C.style.width=W+'px'; C.style.height=H+'px';

  const ROW_COLORS=['#ff0','#ff4488','#cc66ff','#ff6622','#00e5a0','#4db8ff'];

  let spriteScale=1; // escala global sprites enemigo
  function buildWave(lvl){
    const lb=1+loopCount*.18;
    const {type,rows,speed,drop,fr}=lvl;
    // Reducir columnas en móvil para que quepan bien
    const maxCols = W<500 ? 6 : W<700 ? 7 : lvl.cols;
    const cols = Math.min(lvl.cols, maxCols);
    const margin=Math.round(clamp(W*0.06,30,60));
    const maxFormW=W-margin*2;
    // Tamaño enemigo: formación ocupa ~70% del ancho en todos los dispositivos
    const gxBase=Math.round(clamp(W*0.018,8,16)); // gap base entre columnas
    const ewMax = W<500 ? 26 : 40; // más pequeños en móvil, igual en tablet/desktop
    const ew=Math.round(clamp((maxFormW*0.70 - gxBase*(cols-1)) / cols, 14, ewMax));
    const eh=Math.round(ew*0.85);
    spriteScale=ew/40;
    const gx=Math.min(Math.max(gxBase, Math.floor((maxFormW-cols*ew)/(cols-1||1))), Math.round(ew*0.7));
    const gy=Math.round(clamp(H*0.025,14,24));
    const tw=cols*ew+(cols-1)*gx;
    const sx=(W-tw)/2;
    const hudH=W<500?52:64;
    const sy=hudH+18; // justo debajo del HUD
    const list=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const bx=sx+c*(ew+gx)+ew/2,by=sy+r*(eh+gy)+eh/2;
      const hp=type==='splitter'?2:type==='nexus'?3:1;
      const color=ROW_COLORS[r%ROW_COLORS.length];
      list.push({x:bx,y:by,bx,by,w:ew,h:eh,hp,maxHp:hp,type,color,alive:true,phase:Math.random()*Math.PI*2,
        row:r,
        diveActive:false,divePhase:'out',diveT:0,diveDelay:0,

        phantomVisible:true,phantomPhase:Math.random()*Math.PI*2,
        waveDelay:(waveIdx===0?r*12:0),waveAlpha:0});
    }
    return list;
  }

  // ── Sonido dive estilo Galaxian ───────────────
  function beepDive(){
    if(levelIdx<1)return;
    try{
      const a=ac(),now=a.currentTime;
      // Sirena descendente más dramática — sawtooth con más cuerpo
      [480,440,400,355].forEach((f,i)=>{
        const o=a.createOscillator(),g=a.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(f,now+i*.06);
        o.frequency.exponentialRampToValueAtTime(f*.85,now+i*.06+.055);
        g.gain.setValueAtTime(.1,now+i*.06);g.gain.exponentialRampToValueAtTime(.0001,now+i*.06+.06);
        o.connect(g);g.connect(a.destination);o.start(now+i*.06);o.stop(now+i*.06+.07);
      });
      // Cola descendente grave más intensa
      const of=a.createOscillator(),gf=a.createGain();
      of.type='sawtooth';of.frequency.setValueAtTime(320,now+4*.06);
      of.frequency.exponentialRampToValueAtTime(80,now+4*.06+.3);
      gf.gain.setValueAtTime(.12,now+4*.06);gf.gain.exponentialRampToValueAtTime(.0001,now+4*.06+.3);
      of.connect(gf);gf.connect(a.destination);of.start(now+4*.06);of.stop(now+4*.06+.32);
    }catch(e){}
  }

  function tryLaunchDiveGroup(){
    if(levelIdx<1)return;
    if(annActive)return; // no lanzar dives durante el anuncio de nivel
    if(diveGroupCooldown>0){diveGroupCooldown--;return;}
    if(Math.random()>.005)return;
    const pool=[];
    for(let i=0;i<enemies.length;i++){const e=enemies[i];if(e.alive&&!e.diveActive)pool.push(e);}
    if(pool.length<2)return;
    pool.sort((a,b)=>a.by-b.by);
    const n=Math.min(levelIdx>=4?3:2,pool.length);
    pool.slice(0,n).forEach((e,i)=>{
      e.diveActive=true;e.divePhase='out';e.diveT=0;e.diveDelay=i*22;
      e.diveSX=e.x;e.diveSY=e.y;
      e.diveFormOffset=formOffset; // guardar formOffset actual para calcular retorno
      const side=(e.x<W/2)?1:-1;
      e.diveCX1=e.x+side*(100+Math.random()*80);e.diveCY1=e.y+60;
      e.diveCX2=(player?player.x:W/2)+(-40+Math.random()*80);e.diveCY2=H*.55;
      e.diveTX=(player?player.x:W/2)+(-30+Math.random()*60);e.diveTY=H+50;
      e.reentryStartX=e.bx+formOffset+(side*-60);e.reentryStartY=-40;
    });
    beepDive();
    diveGroupCooldown=Math.max(80,220-levelIdx*15)+Math.floor(Math.random()*80);
  }

  function updateDiveEnemy(e,dt=1){
    if(e.diveDelay>0){e.diveDelay--;return;}
    if(e.divePhase==='out'){
      e.diveT+=0.008*dt;
      const t=Math.min(e.diveT,1),t1=1-t;
      e.x=t1*t1*t1*e.diveSX+3*t1*t1*t*e.diveCX1+3*t1*t*t*e.diveCX2+t*t*t*e.diveTX;
      e.y=t1*t1*t1*e.diveSY+3*t1*t1*t*e.diveCY1+3*t1*t*t*e.diveCY2+t*t*t*e.diveTY;
      if(t>=1){
        e.divePhase='return';e.diveT=0;
        e.x=e.reentryStartX;e.y=e.reentryStartY;
      }
    } else {
      e.diveT+=0.015*dt;
      const t=Math.min(e.diveT,1),t1=1-t;
      const destX=e.bx+formOffset;
      const destY=e.by;
      const cx=(e.reentryStartX+destX)/2;
      const cy=e.reentryStartY*0.3+destY*0.7;
      e.x=t1*t1*e.reentryStartX+2*t1*t*cx+t*t*destX;
      e.y=t1*t1*e.reentryStartY+2*t1*t*cy+t*t*destY;
      if(t>=1){
        e.x=destX;e.y=destY;
        e.justLanded=true;
        e.diveActive=false;e.diveT=0;e.divePhase='out';
      }
    }
  }

  // ── Formation movement ─────────────────────────
  function moveFormation(dt=1){
    const lvl=LEVELS[levelIdx];if(!lvl||lvl.isBoss)return;
    const lb=1+loopCount*.18,spd=lvl.speed*lb*fDir*dt;
    let minX=Infinity,maxX=-Infinity,anyAlive=false,minY=Infinity;
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];if(!e.alive)continue;anyAlive=true;
      if(!e.diveActive){minX=Math.min(minX,e.x);maxX=Math.max(maxX,e.x);minY=Math.min(minY,e.by);}
    }
    if(!fDropping&&anyAlive){
      const edgeM=Math.round(clamp(W*0.08,30,60));
      if((fDir>0&&maxX>W-edgeM)||(fDir<0&&minX<edgeM)){
        fDropping=true;fDropLeft=lvl.drop;fDir*=-1;
      }
    }
    // dropStep relativo a pantalla — 1px en móvil, máx 2px
    const dropStep=W<600?1:2;
    if(fDropping){
      fDropLeft-=dropStep;
      if(fDropLeft<=0){fDropping=false;}
    }
    formOffset+=spd;

    // Límite máximo de bajada: no pasar del 55% de la pantalla
    const maxFormY=H*0.55;

    for(const e of enemies){
      if(!e.alive)continue;
      if(e.waveDelay>0){e.waveDelay--;e.waveAlpha=Math.min(1,e.waveAlpha+.06);continue;}
      e.waveAlpha=Math.min(1,e.waveAlpha+.03);
      if(e.diveActive){
        // Mantener bx sincronizado con la formación durante el dive
        if(!fDropping) e.bx+=spd;
        else if(e.by<maxFormY) e.by+=dropStep;
        updateDiveEnemy(e,dt);
        if(e.divePhase==='out'&&!e.diveDelay&&(e.type!=='phantom'||e.alpha>0.3)&&(e.x-player.x)**2+(e.y-player.y)**2<400){
          e.alive=false;playerHit();spawnBurst(e.x,e.y,e.color,18);beep('xplode');continue;
        }
      } else {
        if(fDropping){
          if(e.by<maxFormY){e.y+=dropStep;e.by+=dropStep;}
        } else {
          if(!e.justLanded)e.bx+=spd;
          e.justLanded=false;
          const pat=lvl.pat;
          if(pat==='spiral'){e.x=e.bx+Math.sin(e.phase+frame*.035)*14;e.y=e.by+Math.cos(e.phase+frame*.025)*8;}
          else if(pat==='dive'){e.x=e.bx+Math.sin(e.phase+frame*.04)*8;e.y=e.by+Math.sin(e.phase*2+frame*.035)*6;}
          else if(pat==='sweep'){
            // Efecto ola — cada fila ligeramente desfasada
            const rowPhase=(e.row||0)*0.5;
            e.x=e.bx+Math.sin(frame*.03+rowPhase)*10;
            e.y=e.by+Math.sin(frame*.025+rowPhase)*5;
          }
          else{e.x=e.bx;e.y=e.by;}
        }
        if(e.y>H-50){e.alive=false;playerHit();}
      }
      if(e.type==='kamikaze'&&!e.diveActive&&!annActive&&Math.random()<.002){
        e.diveActive=true;e.divePhase='out';e.diveT=0;e.diveDelay=0;
        e.diveSX=e.x;e.diveSY=e.y;
        const side=e.x<W/2?1:-1;
        e.diveCX1=e.x+side*80;e.diveCY1=e.y+50;
        e.diveCX2=(player?player.x:W/2);e.diveCY2=H*.5;
        e.diveTX=(player?player.x:W/2);e.diveTY=H+50;
        e.reentryStartX=e.bx+formOffset+(side*-60);e.reentryStartY=-40;
        beepDive();
      }
      if(e.type==='phantom'){e.phantomPhase+=.042;const sv=Math.sin(e.phantomPhase);e.phantomVisible=sv>-.2;e.alpha=e.diveActive?1:(e.phantomVisible?(.52+.48*sv):.1);}
      if(!e.diveActive&&(e.type!=='phantom'||e.phantomVisible)&&!annActive&&Math.random()<e.fireRate)enemyFire(e);
      e.flickTimer=Math.max(0,e.flickTimer-1);
    }
    tryLaunchDiveGroup();
  }

  function enemyFire(e){
    const br=clamp(W*0.008,3.5,6); // radio bala: 3.5px móvil, 6px desktop
    const aimed=e.type==='shooter'||e.type==='nexus'||e.type==='phantom';
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy)||1;
    const spd=clamp(H*0.007,3,5.5)+loopCount*.25;
    if(aimed)eBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/d*spd,vy:dy/d*spd,col:e.color,r:br});
    else eBullets.push({x:e.x,y:e.y+e.h/2,vx:(Math.random()-.5)*2,vy:spd*(.8+Math.random()*.4),col:e.color,r:br*0.85});
  }

  // ── Boss logic ────────────────────────────────
  function updateBoss(){
    if(!boss)return;
    if(boss.entering){boss.y+=(boss.targetY-boss.y)*.032;if(Math.abs(boss.y-boss.targetY)<3)boss.entering=false;return;}
    boss.angle+=.019;boss.patternTimer++;boss.moveTimer++;
    if(boss.hp<boss.maxHp*.4&&!boss.enraged)boss.enraged=true;
    if(boss.moveTimer%(boss.enraged?110:190)===0)boss.targetX=100+Math.random()*(W-200);
    boss.x+=(boss.targetX-boss.x)*.017;boss.x=Math.max(95,Math.min(W-95,boss.x));
    boss.shootTimer++;
    const bossShootRate = W<500 ? (boss.enraged?24:42) : (boss.enraged?17:30);
    if(boss.shootTimer>=bossShootRate){boss.shootTimer=0;boss.pattern=(boss.pattern+1)%5;bossFire();}
    updateBossBar();
  }
  function bossFire(){
    const spd=W<500 ? clamp(H*0.006,3,5)+loopCount*.3 : clamp(H*0.009,4,7)+loopCount*.42;
    const pp=[
      ()=>{for(let i=-2;i<=2;i++)eBullets.push({x:boss.x+i*24,y:boss.y+52,vx:i*1.5,vy:spd*.95,col:boss.color,r:clamp(W*0.008,3,5)});},
      ()=>{const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.hypot(dx,dy)||1;for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.23;eBullets.push({x:boss.x,y:boss.y+52,vx:Math.cos(a)*spd*1.1,vy:Math.sin(a)*spd*1.1,col:boss.color,r:clamp(W*0.007,2.5,4.5)});}},
      ()=>{for(let i=0;i<12;i++){const a=i/12*Math.PI*2;eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,col:boss.color,r:clamp(W*0.007,2.5,4.5)});}},
      ()=>{const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.hypot(dx,dy)||1;eBullets.push({x:boss.x,y:boss.y+52,vx:dx/d*spd*1.6,vy:dy/d*spd*1.6,col:'#ffffff',r:clamp(W*0.009,3.5,6)});},
      ()=>{for(let i=0;i<8;i++){const a=i/8*Math.PI*2+boss.angle;eBullets.push({x:boss.x+Math.cos(a)*36,y:boss.y+Math.sin(a)*36,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,col:boss.color,r:clamp(W*0.006,2,4)});}},
    ];
    pp[boss.pattern%pp.length]();
  }
  function updateBossBar(){if(!boss)return;document.getElementById('boss-fill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';}

  // ── Input ─────────────────────────────────────
  let tX=-1,tY=-1,mX=0,mY=0,touchOffX=0,touchOffY=0,hasTouchOffset=false;
  C.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    tX=t.clientX;tY=t.clientY;
    // Offset: nave se queda donde está, el dedo se mueve y la arrastra
    touchOffX=player.x-t.clientX;
    touchOffY=player.y-t.clientY;
    hasTouchOffset=true;
  },{passive:false});
  C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];tX=t.clientX;tY=t.clientY;},{passive:false});
  C.addEventListener('touchend',e=>{e.preventDefault();mX=player.x;mY=player.y;tX=tY=-1;hasTouchOffset=false;},{passive:false});
  window.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;});

  // ── Game logic ────────────────────────────────
  const BSPD=Math.round(clamp(H*0.022,10,16)); // relativo a altura de pantalla
  function update(dt=1){
    if(state==='title'){frame+=dt;moveBg(dt);return;}
    if(state!=='playing'||isPaused)return;
    frame+=dt;moveBg(dt);
    let tx,ty;
    if(tX>=0&&hasTouchOffset){
      tx=tX+touchOffX; ty=tY+touchOffY;
    } else {
      tx=tX>=0?tX:mX; ty=tY>=0?tY:mY;
    }
    player.tx=Math.max(26,Math.min(W-26,tx));
    player.ty=Math.max(H*.45,Math.min(H-clamp(H*0.05,20,40),ty));
    const pdx=player.tx-player.x;
    player.tilt+=(clamp(pdx/W*2.2,-1,1)-player.tilt)*.12*dt;
    player.x+=(player.tx-player.x)*.17*dt;player.y+=(player.ty-player.y)*.17*dt;
    player.x=Math.max(26,Math.min(W-26,player.x));
    if(player.shootCD>0)player.shootCD-=dt;
    if(player.shootCD<=0&&!annActive){
      const cd=player.rapidFire>0?6:12;player.shootCD=cd;
      const boff=clamp(W/420,0.55,1)*26;
      bullets.push({x:player.x,y:player.y-boff,vx:0,vy:-BSPD});
      if(player.triShot>0){bullets.push({x:player.x,y:player.y-20,vx:-3.5,vy:-BSPD+1.3});bullets.push({x:player.x,y:player.y-20,vx:3.5,vy:-BSPD+1.3});}
      beep('shoot');
    }
    if(player.triShot>0)player.triShot-=dt;if(player.rapidFire>0)player.rapidFire-=dt;if(player.shield>0)player.shield-=dt;
    if(invTimer>0){invTimer-=dt;if(invTimer<=0){invTimer=0;invOn=false;}}
    if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){comboTimer=0;comboCount=0;}}
    if(bonusAnnTimer>0)bonusAnnTimer-=dt;
    if(flashTimer>0)flashTimer-=dt;
    // ── Secuencia muerte boss ──────────────────────────────────────────
    if(bossDying&&boss){
      bossDyingTimer+=dt;
      bossDyingExpTimer-=dt;
      // Explosiones en cadena cada ~18 frames
      if(bossDyingExpTimer<=0){
        const ox=(Math.random()-.5)*boss.w*.9,oy=(Math.random()-.5)*boss.h*.9;
        spawnBurst(boss.x+ox,boss.y+oy,boss.color,W<500?18:30);
        spawnShock(boss.x+ox,boss.y+oy,boss.color);
        xplodeFlashes.push({x:boss.x+ox,y:boss.y+oy,r:60,alpha:.5,col:boss.color,decay:.06});
        beep('bigx');
        bossDyingExpTimer=18-Math.min(12,bossDyingTimer*.15); // aceleran con el tiempo
      }
      // Boss parpadea y se sacude
      boss.x+=Math.sin(bossDyingTimer*.8)*2.5*dt;
      // Flash blanco progresivo al final
      if(bossDyingTimer>100){
        const p=Math.min(1,(bossDyingTimer-100)/40);
        flashTimer=5;flashCol=`rgba(255,255,255,${p*.7})`;
      }
      // Explosión final a los ~140 frames
      if(bossDyingTimer>=140){
        // Explosión masiva final
        for(let i=0;i<6;i++){
          const ox2=(Math.random()-.5)*boss.w,oy2=(Math.random()-.5)*boss.h;
          spawnBurst(boss.x+ox2,boss.y+oy2,boss.color,W<500?25:45);
          spawnShock(boss.x+ox2,boss.y+oy2,boss.color);
        }
        flashTimer=35;flashCol='rgba(255,255,255,0.95)';
        boss=null;bossDying=false;bossDyingTimer=0;
        invOn=false;invTimer=0; // quitar invencibilidad
        beep('lvlup');
        setTimeout(()=>showLevelModal('complete'),900);
        state='levelmodal';
      }
    }
    for(let i=xplodeFlashes.length-1;i>=0;i--){xplodeFlashes[i].alpha-=xplodeFlashes[i].decay*dt;if(xplodeFlashes[i].alpha<=0)xplodeFlashes.splice(i,1);}
    for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y<-35||b.x<-35||b.x>W+35)bullets.splice(i,1);}
    if(eBullets.length>120)eBullets.splice(0,eBullets.length-120); // cap para evitar desbordamiento
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.y>H+25||b.y<-35||b.x<-35||b.x>W+35)eBullets.splice(i,1);
    }
    for(const p of powerups){p.y+=1.7*dt;p.angle+=.045*dt;if(Math.hypot(p.x-player.x,p.y-player.y)<30){p.dead=true;applyPU(p.type);beep('pu');spawnBurst(p.x,p.y,PU_COL[p.type],10);}}
    powerups=powerups.filter(p=>!p.dead&&p.y<H+35);
    moveFormation(dt);updateBoss();updParticles();
    // bullet hits
    for(const b of bullets){
      if(boss&&!boss.entering&&Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){
        b.dead=true;boss.hp--;spawnSpark(b.x,b.y,boss.color);beep('bh');updateBossBar();
        if(boss.hp<=0&&!bossDying){
          bossDying=true;bossDyingTimer=0;bossDyingExpTimer=0;
          boss.enraged=false; // dejar de disparar
          eBullets=[];  // limpiar balas enemigas
          invOn=true;invTimer=9999; // jugador invencible durante la secuencia
          addScore(4000);
          document.getElementById('boss-wrap').classList.remove('on');
          beep('bigx');
        }
        continue;
      }
      for(const e of enemies){
        if(!e.alive)continue;if(e.type==='phantom'&&!e.phantomVisible)continue;
        if(Math.abs(b.x-e.x)<e.w/2+3&&Math.abs(b.y-e.y)<e.h/2+3){
          b.dead=true;e.hp--;e.flickTimer=7;spawnSpark(b.x,b.y,e.color);
          if(e.hp<=0){e.alive=false;addScore(110+levelIdx*28);addCombo();spawnBurst(e.x,e.y,e.color);beep('xplode');
            xplodeFlashes.push({x:e.x,y:e.y,r:80,alpha:.35,col:e.color,decay:.055});
            if(Math.random()<.03)maybeSpawnPU(e.x,e.y);
            if(e.type==='splitter'){
      const ox=Math.round(clamp(W*0.055,12,20));
      [-ox,ox].forEach(dx=>{
        enemies.push({...e,x:e.x+dx,y:e.y,bx:e.bx+dx,by:e.by,
          hp:1,maxHp:1,alive:true,flickTimer:0,
          type:'fast',speed:e.speed*1.3,waveDelay:0,waveAlpha:1});
      });
    }}
          break;
        }
      }
    }
    bullets=bullets.filter(b=>!b.dead);
    for(const b of eBullets){if(Math.hypot(b.x-player.x,b.y-player.y)<18){b.dead=true;playerHit();}}
    eBullets=eBullets.filter(b=>!b.dead);
    const lvl=LEVELS[levelIdx];
    if(!lvl.isBoss&&enemies.filter(e=>e.alive).length===0&&state==='playing'){
      if(waveIdx<waveTotal)spawnWave();
      else{beep('lvlup');setTimeout(()=>showLevelModal('complete'),450);state='levelmodal';}
    }
  }

  function playerHit(){
    if(invOn)return;
    if(player.shield>0){player.shield=0;invOn=true;invTimer=80;beep('hit');spawnBurst(player.x,player.y,'#44aaff',12);return;}
    lives--;comboCount=0;updateHUD();beep('hit');
    spawnBurst(player.x,player.y,'#ff4040',40);
    spawnBurst(player.x,player.y,'#ff8800',20);
    spawnShock(player.x,player.y,'#ff2200');
    flashTimer=18;flashCol='rgba(255,0,0,0.35)';
    if(lives<=0){
      // Retrasar game over para que se vean los efectos
      setTimeout(()=>{state='dead';setTimeout(()=>showLevelModal('gameover'),950);},400);
    }
    else{invOn=true;invTimer=165;}
  }

  function addScore(v){
    const m=comboCount>=5?3:comboCount>=3?2:1;
    score+=v*m*(loopCount+1);
    if(nextBonusIdx<bonusLifeAt.length&&score>=bonusLifeAt[nextBonusIdx]&&lives<MAXLIVES+2){
      lives++;bonusAnnScore=score;bonusAnnTimer=200;nextBonusIdx++;beepBonusLife();spawnBurst(player.x,player.y,'#ff44aa',22);
    }
  }
  function addCombo(){
    comboCount++;comboTimer=70;
    if(comboCount>=3){
      const el=document.getElementById('combo-pop');
      document.getElementById('combo-txt').textContent=`×${comboCount} COMBO!`;
      el.classList.add('show');setTimeout(()=>el.classList.remove('show'),700);
      // Sonido de combo que escala con el multiplicador
      try{
        const a=ac(),now=a.currentTime;
        const freqs=comboCount>=8?[660,880,1100]:comboCount>=5?[440,660,880]:[330,440,550];
        freqs.forEach((f,i)=>{
          const g=a.createGain(),o=a.createOscillator();g.connect(a.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.06);
          g.gain.setValueAtTime(.08,now+i*.06);g.gain.exponentialRampToValueAtTime(.0001,now+i*.06+.1);
          o.connect(g);o.start(now+i*.06);o.stop(now+i*.06+.12);
        });
      }catch(e){}
    }
  }
  function applyPU(t){if(t==='trishot')player.triShot=340;else if(t==='rapidfire')player.rapidFire=340;else if(t==='shield')player.shield=460;}
  function maybeSpawnPU(x,y){const types=['trishot','rapidfire','shield'],w=[.38,.38,.24];let r=Math.random(),t=0,type='trishot';for(let i=0;i<types.length;i++){t+=w[i];if(r<t){type=types[i];break;}}powerups.push({x,y,type,angle:0,dead:false});}

  // ── HUD en canvas ─────────────────────────────
  let _scoreStr='0',_lastScore=-1;
  function drawHUD(){
    if(score!==_lastScore){_scoreStr=score.toLocaleString();_lastScore=score;}
    ctx.save();
    const hudH=W<500?52:64;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,hudH);
    const fs=W<500?7:8,fv=W<500?13:16;
    const LBL=fs+"px 'Press Start 2P',monospace",VAL=fv+"px 'Press Start 2P',monospace";
    const col1='rgba(255,255,255,0.65)',col2='#ffffff';
    const TL=W<500?33:20,TV=W<500?57:48,PAD=W<500?14:18;
    // SCORE
    ctx.textAlign='left';
    ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText(t('score'),PAD,TL);
    ctx.font=VAL;ctx.fillStyle=col2;ctx.fillText(_scoreStr,PAD,TV);
    // LEVEL
    ctx.textAlign='center';
    ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText(t('level'),W/2,TL);
    ctx.font=VAL;ctx.fillStyle=col2;ctx.fillText(levelIdx+1,W/2,TV);
    if(loopCount>0){ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#f5c842';ctx.fillText('★'.repeat(loopCount),W/2,TV+18);}
    // LIVES
    const sw=W<500?16:22,gap=W<500?5:8;
    const maxShow=MAXLIVES+2,totalW=maxShow*(sw+gap)-gap,sx=W-PAD-totalW;
    ctx.textAlign='left';
    ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText(t('lives'),sx,TL);
    for(let i=0;i<maxShow;i++){
      const alive=i<lives,x=sx+i*(sw+gap),y=TV-16;
      ctx.globalAlpha=alive?1:.18;
      ctx.fillStyle='#1a4a7a';ctx.fillRect(x+7,y+14,8,4);ctx.fillRect(x+1,y+9,20,5);ctx.fillRect(x+3,y+4,16,5);
      ctx.fillStyle='#2e7ac0';ctx.fillRect(x+5,y+4,12,5);ctx.fillRect(x+8,y+1,6,5);
      ctx.fillStyle='#4db8ff';ctx.fillRect(x+9,y,4,4);
      ctx.fillStyle='#aaddff';ctx.fillRect(x+10,y+1,2,2);
      ctx.globalAlpha=1;
    }
    // Anuncio vida extra
    if(bonusAnnTimer>0){
      const al=bonusAnnTimer>30?1:bonusAnnTimer/30;
      const sc=bonusAnnTimer>170?1+(200-bonusAnnTimer)*.015:1;
      ctx.save();
      ctx.globalAlpha=al;
      ctx.translate(W/2,H/2-60);ctx.scale(sc,sc);
      ctx.textAlign='center';
      ctx.font="16px 'Press Start 2P',monospace";
      ctx.fillStyle='#ff44aa';
      ctx.fillText(t('extraLife'),0,0);
      ctx.font="8px 'Press Start 2P',monospace";
      ctx.fillStyle='rgba(255,180,230,.9)';
      ctx.fillText((bonusAnnScore>=1000000?'1.000.000':'500.000')+' '+t('score_lbl'),0,30);
      ctx.restore();
    }
    ctx.restore();
  }

  // ── Announce ──────────────────────────────────
  function showAnn(idx){
    const lvl=LEVELS[idx];
    const a=document.getElementById('ann'),sub=document.getElementById('ann-sub'),nm=document.getElementById('ann-name');
    sub.textContent=loopCount>0?t('sectorLoop',{n:idx+1,l:loopCount+1}):t('annSector',{n:idx+1});

  // ── Modal ─────────────────────────────────────
  function showModal(){document.getElementById('modal').classList.remove('hide');}
  function hideModal(){document.getElementById('modal').classList.add('hide');}
  function showLevelModal(mode){
    modalMode=mode;
    const el=id=>document.getElementById(id);
    el('m-stars').style.display='none';el('m-scores').style.display='none';
    el('m-info').textContent='';el('m-hi').textContent='';
    el('m-btn2-wrap').style.display='none';
    el('m-btn3-wrap').style.display='none';
    el('m-btn2').textContent=t('mainMenu');
    el('m-btn2').onclick=goMenu;
    el('m-btn3').textContent=t('mainMenu');
    el('m-btn3').onclick=goMenu;
    el('m-btn').onclick=modalAction; // restaurar onclick por defecto
    if(mode==='title'){
      hideModal(); // título se dibuja en canvas
      state='title';
      return;
    } else if(mode==='complete'){
      const nextLvl=LEVELS[levelIdx+1];const isEnd=!nextLvl;
      el('m-label').textContent=t('sectorCleared',{n:levelIdx+1});
      if(isEnd){
        loopCount++;
        el('m-title').textContent=t('loopTitle',{n:loopCount+1});
        el('m-sub').textContent=t('allCleared');
        el('m-stars').style.display='flex';el('m-stars').innerHTML='';
        for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);}
      } else {
        el('m-title').textContent=nextLvl.name;
        el('m-sub').textContent=t('nextSector',{n:levelIdx+2});
      }
      el('m-btn').textContent=isEnd?t('continueBtn'):t('nextBtn');
    } else if(mode==='gameover'){
      el('m-label').textContent=t('missionFailed');
      el('m-title').textContent='GAME OVER';
      el('m-sub').textContent=t('sector',{n:levelIdx+1})+' — '+(LEVELS[Math.min(levelIdx,LEVELS.length-1)]?.name||'');
      el('m-scores').style.display='block';
      el('m-sval').textContent=score.toLocaleString();
      if(score>hiScore){hiScore=score;localStorage.setItem('galax_hi',hiScore);el('m-hi').textContent=t('newRecord');}
      else if(hiScore>0)el('m-hi').textContent=t('record')+' '+hiScore.toLocaleString();
      if(loopCount>0){el('m-stars').style.display='flex';el('m-stars').innerHTML='';for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);}}
      el('m-btn').textContent=t('retry');
      el('m-btn2-wrap').style.display='block';
      el('m-btn2').textContent=t('mainMenu');
      el('m-btn2').onclick=goMenu;
      // Mostrar interstitial en game over
      try{window.GalaxBridge?.showInterstitial();}catch(e){}
      // Si hay reward disponible: continuar es el botón principal, retry y menú secundarios
      canContinueWithAd=false;
      try{
        if(window.GalaxBridge?.isRewardedReady()){
          canContinueWithAd=true;
          el('m-btn').textContent=t('watchAd');
          el('m-btn').onclick=watchAdToContinue;
          el('m-btn2-wrap').style.display='block';
          el('m-btn2').textContent=t('retry');
          el('m-btn2').onclick=function(){hideModal();startGame();};
          el('m-btn3-wrap').style.display='block';
          el('m-btn3').textContent=t('mainMenu');
          el('m-btn3').onclick=goMenu;
        }
      }catch(e){}
    }
    showModal();
  }
  function goMenu(){hideModal();document.getElementById('boss-wrap').classList.remove('on');
    document.getElementById('ctrl-btns').classList.remove('on');
    document.getElementById('pause-overlay').classList.remove('on');
    isPaused=false;initTitleEnemies();showLevelModal('title');}
  function modalAction(){
    if(modalMode==='title'){startGame();}
    else if(modalMode==='complete'){
      hideModal();levelIdx++;if(levelIdx>=LEVELS.length)levelIdx=0;initLevel(levelIdx);updateHUD();state='playing';
      levelsCompleted++;
      if(levelsCompleted>0&&levelsCompleted%3===0){
        // Cada 4 niveles mostrar interstitial — no interrumpe el juego, se lanza en background
        try{window.GalaxBridge?.showInterstitial();}catch(e){}
      }
    }
    else if(modalMode==='gameover'){hideModal();startGame();}
  }

  // ── Title screen canvas ───────────────────────
  // Demo enemies que desfilan en la pantalla de título
  // ── Desfile de enemigos en título ────────────────
  const PARADE=[
    {type:'classic', color:'#ff4488', get name(){return t('drone')},     pts:'10 PTS'},
    {type:'fast',    color:'#00e5a0', get name(){return t('wasp')},      pts:'20 PTS'},
    {type:'vortex',  color:'#ff9500', get name(){return t('cyclone')},   pts:'20 PTS'},
    {type:'phantom', color:'#cc66ff', get name(){return t('wraith')},    pts:'30 PTS'},
    {type:'splitter',color:'#ff4466', get name(){return t('fracture')},  pts:'30 PTS'},
    {type:'kamikaze',color:'#ffe44d', get name(){return t('berserker')}, pts:'40 PTS'},
    {type:'shooter', color:'#ff5533', get name(){return t('gunship')},   pts:'50 PTS'},
    {type:'nexus',   color:'#00ccff', get name(){return t('nexus')},     pts:'60 PTS'},
    {type:'inferno', color:'#ff2200', get name(){return t('inferno')},   pts:'70 PTS'},
    {type:'oblivion',color:'#aa00ff', get name(){return t('oblivion')},  pts:'80 PTS'},
  ];
  let paradeIdx=0, paradeX=0, paradePhase='enter'; // enter|pause|exit
  let paradeTimer=0;
  const PARADE_PAUSE=90; // frames parado en centro
  let paradeLastIdx=-1, paradeLastFrame=-1; // para detectar cambio de enemigo

  function initTitleEnemies(){
    paradeIdx=0; paradePhase='enter';
    paradeX=W+80; paradeTimer=0;
    paradeLastIdx=-1;
  }

  function drawTitleScreen(){
    if(state!=='title')return;
    const PF="'Press Start 2P',monospace";

    const logoSize = W<500 ? 32 : W<800 ? 48 : 64;
    const logoY    = 80 + logoSize;
    const subY     = logoY + 28;
    const hiY      = subY + 28;
    const iy       = Math.max(H*0.58, H*0.52+80);
    const lineH    = 32;
    const ty       = iy + lineH*2.6;
    const tapY     = H*0.93;

    const TS  = W<500 ? 10 : 12; // tamaño base texto — 10px móvil, 12px desktop
    const TSL = W<500 ? 12 : 16; // tamaño grande — TAP TO PLAY, nombre enemigo

    // ── Logo GALAX ───────────────────────────────────────────────
    ctx.save();
    ctx.textAlign='center';
    ctx.font=logoSize+"px "+PF;
    if(W>=500){ctx.shadowColor='#4db8ff'; ctx.shadowBlur=24+12*Math.sin(frame*.05);}
    ctx.fillStyle='#4db8ff';
    ctx.fillText('GALAX',W/2+2,logoY+2);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';
    ctx.fillText('GALAX',W/2,logoY);
    if(!titleLineGradient||titleLineGradientW!==W){
      titleLineGradient=ctx.createLinearGradient(W/2-120,0,W/2+120,0);
      titleLineGradient.addColorStop(0,'transparent');titleLineGradient.addColorStop(.5,'rgba(77,184,255,.6)');titleLineGradient.addColorStop(1,'transparent');
      titleLineGradientW=W;
    }
    ctx.fillStyle=titleLineGradient; ctx.fillRect(W/2-120,logoY+10,240,2);
    ctx.font=TS+"px "+PF;
    ctx.fillStyle='rgba(150,210,255,.9)';
    ctx.fillText(t('tagline'),W/2,subY);
    if(hiScore>0){
      ctx.fillStyle='#f5c842';
      ctx.shadowColor='#f5c842'; ctx.shadowBlur=6;
      ctx.fillText(t('best')+' '+hiScore.toLocaleString(),W/2,hiY);
      ctx.shadowBlur=0;
    }
    ctx.restore();

    // ── Zona enemigo: fija entre hi-score y las instrucciones ────
    const eTop = hiY + 20;
    const eBot = H * 0.52;   // siempre termina al 52% de la pantalla
    const eCY  = Math.round((eTop + eBot) / 2);
    const eH   = eBot - eTop;
    const eScale = clamp(eH / 100, 1.0, 2.2);
    const spriteH = Math.round(40 * eScale); // altura aprox sprite escalado

    const p = PARADE[paradeIdx % PARADE.length];
    const spd = 2; // lento y elegante

    // Avanzar estado
    if(paradePhase==='enter'){
      paradeX -= spd;
      if(paradeX <= W/2){paradeX=W/2; paradePhase='pause'; paradeTimer=PARADE_PAUSE;}
    } else if(paradePhase==='pause'){
      paradeTimer--;
      if(paradeTimer<=0){paradePhase='exit';}
    } else {
      paradeX -= spd;
      if(paradeX < -80){
        paradeIdx = (paradeIdx+1) % PARADE.length;
        paradeX = W+80; paradePhase='enter';
      }
    }

    // Dibujar enemigo — phase a 20fps para reducir carga
    const paradeFrame=Math.floor(frame/3); // 20fps en lugar de 60fps
    const dummy={x:paradeX, y:eCY, type:p.type, color:p.color,
      alive:true, flickTimer:0, alpha:1, hp:1, maxHp:1,
      phase:paradeFrame*.04, diveActive:false, phantomPhase:paradeFrame*.04};
    const prevScale = spriteScale;
    spriteScale = eScale;
    drawEnemy(dummy);
    spriteScale = prevScale;

    // Nombre y puntos debajo del sprite — solo durante pausa
    if(paradePhase==='pause'){
      const fade = paradeTimer>15?1:paradeTimer/15;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.textAlign = 'center';
      ctx.font = TSL+"px "+PF;
      ctx.fillStyle = p.color;
      ctx.fillText(p.name, paradeX, eCY + spriteH + 20);
      ctx.font = TS+"px "+PF;
      ctx.fillStyle = '#ffe44d';
      ctx.fillText(p.pts,  paradeX, eCY + spriteH + 20 + TSL + 6);
      ctx.restore();
    }

    // ── Instrucciones ────────────────────────────────────────────
    ctx.save();
    ctx.textAlign='center';
    ctx.font=TS+"px "+PF;
    ctx.fillStyle='rgba(200,230,255,.9)';
    ctx.fillText(t('move'),W/2,iy);
    ctx.fillText(t('autofire'),W/2,iy+lineH);
    // TAP TO PLAY — fade suave y lento
    ctx.globalAlpha = 0.4 + 0.6*Math.abs(Math.sin(frame*0.025));
    ctx.font=TSL+"px "+PF;
    ctx.fillStyle='#ffffff';
    if(W>=500){ctx.shadowColor='#4db8ff'; ctx.shadowBlur=10;}
    ctx.fillText(t('tap'),W/2,tapY);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();
  }


  // ── Pause / Mute ──────────────────────────────────────────────────
  function togglePause(){
    if(state!=='playing')return;
    isPaused=!isPaused;
    if(!isPaused){
      // Restaurar posición al reanudar
      mX=player.x;mY=player.y;tX=-1;tY=-1;hasTouchOffset=false;
    }
    document.getElementById('pause-overlay').classList.toggle('on',isPaused);
    document.getElementById('btn-pause').textContent=isPaused?'▶':'⏸';
  }
  function toggleMute(){
    isMuted=!isMuted;
    document.getElementById('btn-mute').textContent=isMuted?'🔇':'🔊';
  }
  function pauseGoMenu(){
    isPaused=false;
    document.getElementById('pause-overlay').classList.remove('on');
    goMenu();
  }
  // Llamado desde Android cuando el coche empieza a moverse — DD-2/DD-3
  window.onDrivingStarted=function(){
    if(state==='playing'&&!isPaused)togglePause();
  };
  window.canReload=function(){return state==='title';};
  // Pausar automáticamente cuando la app va a background
  document.addEventListener('visibilitychange',function(){
    if(document.hidden&&state==='playing'&&!isPaused)togglePause();
  });


  // ── AdMob helpers ─────────────────────────────────────────────────
  function watchAdToContinue(){
    try{
      if(window.GalaxBridge?.isRewardedReady()){
        window.GalaxBridge.showRewarded();
      } else {
        // No hay anuncio disponible — reintentar directamente
        hideModal();startGame();
      }
    }catch(e){hideModal();startGame();}
  }

  // Callback desde Android cuando el usuario ha completado el anuncio reward
  window.onRewardGranted=function(){
    if(canContinueWithAd){
      canContinueWithAd=false;
      hideModal();
      // Revivir con 1 vida en el nivel donde murió
      lives=1;invOn=true;invTimer=200;
      const py=H-clamp(H*0.12,60,100);
      player.x=W/2;player.y=py;player.tx=W/2;player.ty=py;
      mX=W/2;mY=py;
      flashTimer=0;
      state='playing';
      updateHUD();
      document.getElementById('ctrl-btns').classList.add('on');
      beep('pu'); // sonido de power-up al revivir
    }
  };

  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

  // ── Game start ────────────────────────────────
  function startGame(){
    document.getElementById('boss-wrap').classList.remove('on');
    document.getElementById('ctrl-btns').classList.add('on');
    score=0;lives=3;loopCount=0;levelIdx=0;comboCount=0;comboTimer=0;invOn=false;invTimer=0;frame=0;
    nextBonusIdx=0;
    initBg();initPlayer();initLevel(0);state='playing';updateHUD();
  }

  // ── Render ────────────────────────────────────
  function render(){
    const lvl=LEVELS[Math.min(levelIdx,LEVELS.length-1)];
    drawBg(state==='title'?{bg:[0,4,18]}:lvl);
    if(state!=='title')drawHUD();
    if(state==='title'){
      drawTitleScreen();
      return;
    }
    if(state==='playing'||state==='dead'||state==='levelmodal'){
      for(const e of enemies){if(!e.alive)continue;ctx.save();ctx.globalAlpha=e.waveAlpha;drawEnemy(e);ctx.restore();}
      if(boss)drawBossShip(boss);
      drawBullets();drawPowerups();
    // Flashes de explosión — después de balas y powerups
    for(const f of xplodeFlashes){
      const rg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      let hex=f.col.replace('#','');
      if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]; // expandir shorthand
      const fr=parseInt(hex.slice(0,2),16)||0,fg=parseInt(hex.slice(2,4),16)||0,fb=parseInt(hex.slice(4,6),16)||0;
      rg.addColorStop(0,`rgba(${fr},${fg},${fb},${f.alpha})`);
      rg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
    }
      drawParticles();
      if(state!=='dead'&&(!invOn||Math.floor(invTimer/5)%2===0))drawPlayer(player.x,player.y,player.shield>0,player.triShot>0,player.rapidFire>0);
    }
    // Flash de pantalla — encima de todo
    if(flashTimer>0){
      ctx.fillStyle=flashCol;
      ctx.fillRect(0,0,W,H);
    }
  }

  let _lastT=null;
  function loop(ts){
    requestAnimationFrame(loop);
    if(_lastT===null){_lastT=ts;return;}
    const dtMs=ts-_lastT;
    _lastT=ts;
    // dt normalizado: 1.0 = 16.67ms (60fps). Cap a 3 para evitar saltos tras foco perdido
    const dt=Math.min(dtMs/16.667, 3.0);
    update(dt);render();
  }

  // ── Init ──────────────────────────────────────
  hiScore=parseInt(localStorage.getItem('galax_hi')||'0');
  score=0;lives=3;loopCount=0;levelIdx=0;frame=0;
  initBg();initPlayer();bullets=[];eBullets=[];enemies=[];particles=[];powerups=[];
  mX=W/2;mY=H-80;
  initTitleEnemies();
  // Esperar fuente antes de mostrar título
  document.fonts.ready.then(()=>{showLevelModal('title');}).catch(()=>{showLevelModal('title');});
  const msl=document.getElementById('m-score-lbl');if(msl)msl.textContent=t('score_lbl');
  const mb2=document.getElementById('m-btn2');if(mb2)mb2.textContent=t('mainMenu');
  document.getElementById('pause-title').textContent=t('pauseTitle');
  document.getElementById('resume-btn').textContent=t('resumeBtn');
  document.getElementById('menu-btn').textContent=t('menuBtn');

  // Click/tap en título arranca el juego
  function handleTitleStart(e){
    if(state==='title'){
      if(e.target.id==='m-btn'||e.target.classList.contains('m-btn'))return;
      startGame();
    }
  }
  C.addEventListener('click', handleTitleStart);
  C.addEventListener('touchend', handleTitleStart, {passive:true});
  requestAnimationFrame(loop);
</script>
</body>
</html>
