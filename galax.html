<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GALAX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 22px;pointer-events:none;z-index:20}
.hud-block{display:flex;flex-direction:column;gap:3px}
.hud-label{font-size:9px;letter-spacing:4px;color:rgba(180,220,255,0.45);text-transform:uppercase}
.hud-value{font-size:20px;font-weight:bold;color:#b4e0ff;text-shadow:0 0 12px #4db8ff80;letter-spacing:2px}
.hud-center{text-align:center;align-items:center}
#lives-row{display:flex;gap:5px;margin-top:3px}
.life-ship{opacity:1;transition:opacity .3s}
.life-ship.dead{opacity:.12}
#loop-stars{display:flex;gap:4px;margin-top:4px;justify-content:center}
.loop-star{font-size:14px;color:#f5c842;text-shadow:0 0 8px #f5c842}
#boss-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);width:min(380px,75vw);z-index:20;display:none}
#boss-wrap.on{display:block}
.boss-lbl{font-size:9px;letter-spacing:5px;color:#ff4488;text-shadow:0 0 8px #ff4488;margin-bottom:5px;text-align:center}
.boss-track{height:6px;background:rgba(255,68,136,.15);border:1px solid rgba(255,68,136,.3);border-radius:3px;overflow:hidden}
#boss-fill{height:100%;background:linear-gradient(90deg,#ff1466,#ff8800);border-radius:3px;transition:width .08s}
#ann{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:30;opacity:0;transition:opacity .4s}
#ann.show{opacity:1}
.ann-sub{font-size:11px;letter-spacing:8px;color:rgba(255,255,255,.5);margin-bottom:10px}
.ann-name{font-size:clamp(36px,9vw,72px);font-weight:900;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 40px currentColor}
#combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:25;opacity:0;transition:opacity .15s;text-align:center}
#combo-pop.show{opacity:1}
.combo-txt{font-size:clamp(12px,3vw,18px);color:#ffe44d;text-shadow:0 0 20px #ffe44d;letter-spacing:2px}
#modal{position:fixed;inset:0;background:rgba(0,4,14,.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100}
#modal.hide{display:none}
.mbox{border:1px solid rgba(100,180,255,.18);background:linear-gradient(160deg,rgba(0,12,36,.97),rgba(0,4,18,.99));border-radius:16px;padding:clamp(20px,3vw,40px) clamp(20px,4vw,48px);text-align:center;max-width:480px;width:92%;box-shadow:0 0 80px rgba(40,110,255,.1),0 0 180px rgba(40,110,255,.05)}
.m-label{font-size:9px;letter-spacing:3px;color:rgba(150,210,255,.8);text-transform:uppercase;margin-bottom:12px;font-family:'Press Start 2P',monospace}
.m-title{font-size:clamp(18px,4.5vw,40px);font-weight:900;letter-spacing:2px;font-family:'Press Start 2P',monospace;color:#b4e0ff;text-shadow:0 0 30px #4db8ff,0 0 60px #4db8ff40;margin-bottom:5px;line-height:1.1;word-break:break-word}
.m-sub{font-size:8px;letter-spacing:1px;color:rgba(160,215,255,.85);margin-bottom:28px;min-height:16px;line-height:1.8}
.m-scores{margin-bottom:24px}
.m-score-lbl{font-size:8px;letter-spacing:1px;color:rgba(180,220,255,.8);margin-bottom:8px}
.m-score-val{font-size:clamp(18px,4vw,28px);color:#fff;letter-spacing:2px;text-shadow:0 0 16px #fff4;font-family:'Press Start 2P',monospace}
.m-hi{font-size:8px;color:#f5c842;letter-spacing:1px;text-shadow:0 0 8px #f5c84270;margin-top:5px;min-height:16px}
.m-btn{display:inline-block;background:rgba(0,80,160,.3);border:1.5px solid rgba(100,180,255,.7);color:#e8f6ff;font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:14px 32px;cursor:pointer;text-transform:uppercase;transition:all .2s;border-radius:6px;box-shadow:0 0 24px rgba(77,184,255,.2)}
.m-btn:hover,.m-btn:active{border-color:#4db8ff;background:rgba(77,184,255,.18);box-shadow:0 0 28px rgba(77,184,255,.35);transform:scale(1.04)}
.m-btn2{display:inline-block;background:transparent;border:1px solid rgba(100,180,255,.4);color:rgba(180,220,255,.75);font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;padding:10px 24px;cursor:pointer;text-transform:uppercase;transition:all .2s;border-radius:6px;margin-top:10px}
.m-btn2:hover,.m-btn2:active{border-color:rgba(100,180,255,.7);color:#c8e8ff;background:rgba(77,184,255,.1)}
.m-div{width:50px;height:1px;background:rgba(100,180,255,.12);margin:18px auto}
.m-info{font-size:8px;letter-spacing:1px;color:rgba(160,210,255,.75);margin-top:14px;line-height:2}
.m-lstars{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.m-lstars .ls{font-size:18px;color:#f5c842;text-shadow:0 0 10px #f5c842}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" style="display:none"></div>
<div id="boss-wrap"><div class="boss-lbl">⚠ OVERLORD</div><div class="boss-track"><div id="boss-fill" style="width:100%"></div></div></div>
<div id="ann"><div class="ann-sub" id="ann-sub">Level 1</div><div class="ann-name" id="ann-name">FORMATION</div></div>
<div id="combo-pop"><div class="combo-txt" id="combo-txt">×3 COMBO!</div></div>
<div id="modal">
  <div class="mbox">
    <div class="m-label" id="m-label">GALAX</div>
    <div class="m-title" id="m-title">GALAX</div>
    <div class="m-sub" id="m-sub">DEEP SPACE WARFARE</div>
    <div class="m-lstars" id="m-stars" style="display:none"></div>
    <div class="m-scores" id="m-scores" style="display:none">
      <div class="m-score-lbl">PUNTUACIÓN</div>
      <div class="m-score-val" id="m-sval">0</div>
      <div class="m-hi" id="m-hi"></div>
    </div>
    <div class="m-div"></div>
    <button class="m-btn" id="m-btn" onclick="modalAction()">INICIAR</button>
    <div id="m-btn2-wrap" style="display:none"><br><button class="m-btn2" onclick="goMenu()">MENÚ PRINCIPAL</button></div>
    <div class="m-info" id="m-info"></div>
  </div>
</div>
<script>
let nebulaCache=null,nebulaCacheBg='';
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  const dpr=Math.min(window.devicePixelRatio||1, 2); // cap a 2x para rendimiento
  C.width=Math.round(W*dpr); C.height=Math.round(H*dpr);
  C.style.width=W+'px'; C.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled=false;
  nebulaCache=null; // rebuild nebula on resize
}
resize();window.addEventListener('resize',resize);
const MAXLIVES=3;
let bonusLifeAt=[500000,1000000],nextBonusIdx=0;
let bonusAnnTimer=0,bonusAnnScore=0;
let score,hiScore,lives,loopCount,levelIdx,state='title',invTimer=0,invOn=false,comboCount=0,comboTimer=0,modalMode='title',frame=0;

// ── Audio ──────────────────────────────────────
let AC=null;
function ac(){return AC||(AC=new(window.AudioContext||window.webkitAudioContext)());}
function beep(t){
  try{const a=ac(),now=a.currentTime,g=a.createGain();g.connect(a.destination);
  if(t==='shoot'){const o=a.createOscillator();o.type='square';o.frequency.setValueAtTime(1100,now);o.frequency.exponentialRampToValueAtTime(550,now+.055);g.gain.setValueAtTime(.045,now);g.gain.exponentialRampToValueAtTime(.001,now+.055);o.connect(g);o.start(now);o.stop(now+.06);}
  else if(t==='xplode'){const b=a.createBuffer(1,a.sampleRate*.16,a.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=a.createBufferSource(),f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=280;f.Q.value=.8;s.buffer=b;s.connect(f);f.connect(g);g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.16);s.start(now);}
  else if(t==='bigx'){const b=a.createBuffer(1,a.sampleRate*.32,a.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length*.65);const s=a.createBufferSource(),f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=700;s.buffer=b;s.connect(f);f.connect(g);g.gain.setValueAtTime(.45,now);g.gain.exponentialRampToValueAtTime(.001,now+.32);s.start(now);}
  else if(t==='hit'){const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(210,now);o.frequency.exponentialRampToValueAtTime(75,now+.2);g.gain.setValueAtTime(.18,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.connect(g);o.start(now);o.stop(now+.2);}
  else if(t==='pu'){const o=a.createOscillator();o.type='sine';o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(1050,now+.17);g.gain.setValueAtTime(.13,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.connect(g);o.start(now);o.stop(now+.2);}
  else if(t==='bh'){const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(130,now);o.frequency.exponentialRampToValueAtTime(65,now+.08);g.gain.setValueAtTime(.11,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);o.connect(g);o.start(now);o.stop(now+.08);}
  else if(t==='lvlup'){[0,.1,.2,.33].forEach((d,i)=>{const o=a.createOscillator(),gg=a.createGain();o.type='square';o.frequency.setValueAtTime([330,440,550,660][i],now+d);gg.gain.setValueAtTime(.07,now+d);gg.gain.exponentialRampToValueAtTime(.001,now+d+.08);o.connect(gg);gg.connect(a.destination);o.start(now+d);o.stop(now+d+.1);});}
  }catch(e){}}
function beepBonusLife(){
  try{
    const a=ac(),now=a.currentTime;
    [[0,330,.08],[.1,440,.08],[.2,550,.08],[.32,660,.1],[.46,880,.15],[.62,660,.07],[.72,880,.22]].forEach(([t,f,d])=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type='square';o.frequency.setValueAtTime(f,now+t);
      g.gain.setValueAtTime(.12,now+t);g.gain.exponentialRampToValueAtTime(.001,now+t+d);
      o.connect(g);g.connect(a.destination);o.start(now+t);o.stop(now+t+d+.02);
    });
  }catch(e){}
}

// ── Levels ─────────────────────────────────────
const LEVELS=[
  {name:'FORMATION',  color:'#4db8ff',bg:[0,7,26],   type:'classic', rows:3,cols:8, waveCount:2,speed:.4, drop:16,fr:.0005,pat:'sweep' },
  {name:'SWARM',      color:'#00e5a0',bg:[0,18,13],  type:'fast',    rows:3,cols:9, waveCount:2,speed:.65,drop:13,fr:.0008,pat:'dive'  },
  {name:'VORTEX',     color:'#ff9500',bg:[18,9,0],   type:'vortex',  rows:3,cols:9, waveCount:3,speed:.75,drop:15,fr:.001, pat:'spiral'},
  {name:'PHANTOM',    color:'#cc66ff',bg:[11,0,20],  type:'phantom', rows:4,cols:8, waveCount:3,speed:.8, drop:17,fr:.0012,pat:'sweep' },
  {name:'SPLITTER',   color:'#ff4466',bg:[20,0,7],   type:'splitter',rows:4,cols:8, waveCount:3,speed:.9, drop:18,fr:.0014,pat:'dive'  },
  {name:'KAMIKAZE',   color:'#ffe44d',bg:[16,13,0],  type:'kamikaze',rows:4,cols:9, waveCount:4,speed:1.0,drop:12,fr:.0010,pat:'dive'  },
  {name:'BARRAGE',    color:'#ff5533',bg:[20,3,0],   type:'shooter', rows:4,cols:9, waveCount:4,speed:1.1,drop:16,fr:.0020,pat:'sweep' },
  {name:'NEXUS',      color:'#00ccff',bg:[0,12,20],  type:'nexus',   rows:4,cols:8, waveCount:4,speed:1.2,drop:14,fr:.0018,pat:'spiral'},
  {name:'OVERLORD',   color:'#ff1466',bg:[16,0,12],  isBoss:true},
];

// ── Background ────────────────────────────────
let stars=[],nebula=[];
function initBg(){
  stars=[];
  [[120,.25,.6],[70,.6,1.1],[30,1.4,1.8]].forEach(([n,spd,r],l)=>{
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:r*(Math.random()*.5+.8),spd:spd*(Math.random()*.4+.8),alpha:Math.random()*.7+.3,layer:l,tw:Math.random()*Math.PI*2,tws:.01+Math.random()*.04});
  });
  nebula=[];
  [[200,260],[280,300],[180,200],[320,180],[120,280]].forEach(([hue,hue2],i)=>{
    nebula.push({x:Math.random()*W,y:Math.random()*H,rx:130+Math.random()*180,ry:70+Math.random()*110,hue,alpha:.022+Math.random()*.018});
  });
}
function moveBg(){
  for(let i=0;i<stars.length;i++){const s=stars[i];s.y+=s.spd;if(s.y>H+4){s.y=-4;s.x=Math.random()*W;}}
}
function buildNebulaCache(bg){
  const key=bg.join(',');
  if(nebulaCache&&nebulaCacheBg===key)return;
  nebulaCacheBg=key;
  const nc=document.createElement('canvas');nc.width=W;nc.height=H;
  const c2=nc.getContext('2d');
  c2.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`;c2.fillRect(0,0,W,H);
  nebula.forEach(n=>{
    const sc=Math.max(n.rx,n.ry);c2.save();c2.scale(n.rx/sc,n.ry/sc);
    const gx=n.x*(sc/n.rx),gy=n.y*(sc/n.ry);
    const g=c2.createRadialGradient(gx,gy,0,gx,gy,sc);
    g.addColorStop(0,`hsla(${n.hue},75%,58%,${n.alpha*1.9})`);
    g.addColorStop(1,`hsla(${n.hue},75%,38%,0)`);
    c2.fillStyle=g;c2.beginPath();c2.arc(gx,gy,sc,0,Math.PI*2);c2.fill();c2.restore();
  });
  nebulaCache=nc;
}
function drawBg(lvl){
  const bg=lvl?.isBoss?[16,0,12]:(lvl?.bg||[0,4,18]);
  buildNebulaCache(bg);
  ctx.drawImage(nebulaCache,0,0);
  for(let i=0;i<stars.length;i++){
    const s=stars[i];
    ctx.fillStyle=s.layer===1?`rgba(255,240,200,${s.alpha})`:`rgba(180,210,255,${s.alpha})`;
    ctx.fillRect(s.x|0,s.y|0,Math.ceil(s.r),Math.ceil(s.r));
  }
}

// ── Ship drawings ─────────────────────────────
function drawPlayer(x,y,shOn,triOn,rapOn){
  ctx.save();ctx.translate(x,y);
  const ft=frame%8<4?1:.7;
  ctx.fillStyle=`rgba(80,180,255,${ft*.6})`;p(-4,14,8,4);
  ctx.fillStyle=`rgba(140,220,255,${ft*.8})`;p(-2,18,4,4);
  ctx.fillStyle='rgba(255,255,255,.9)';p(-1,24,2,2);
  ctx.fillStyle='#0d2e52';p(-24,4,10,8);p(14,4,10,8);
  ctx.fillStyle='#1a4a7a';p(-22,2,8,10);p(14,2,8,10);
  ctx.fillStyle='#2e7ac0';p(-22,2,6,2);p(16,2,6,2);
  ctx.fillStyle='#4db8ff';p(-22,2,2,2);p(20,2,2,2);
  ctx.fillStyle='#0d2e52';p(-8,-2,16,16);
  ctx.fillStyle='#1a4a7a';p(-6,-6,12,18);
  ctx.fillStyle='#2e7ac0';p(-4,-10,8,18);
  ctx.fillStyle='#1a4a7a';p(-2,-14,4,6);
  ctx.fillStyle='#4db8ff';p(-2,-14,4,2);p(-4,-6,2,2);p(2,-6,2,2);
  ctx.fillStyle='#88ddff';p(-2,-12,4,6);
  ctx.fillStyle='rgba(200,240,255,.9)';p(-1,-11,2,4);
  if(triOn){ctx.fillStyle='#ffe44d';p(-10,4,4,4);p(6,4,4,4);}
  if(rapOn){ctx.fillStyle='#ff8800';p(-2,8,4,4);}
  if(shOn){
    const sp=.5+.5*Math.sin(frame*.12);
    ctx.strokeStyle=`rgba(100,200,255,${.5+.3*sp})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,32+sp*2,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);
  const fl=e.flickTimer>0?(e.flickTimer%2===0?.22:1):(e.alpha??1);
  ctx.globalAlpha*=fl;ctx.shadowColor=e.color;ctx.shadowBlur=14;
  const col=e.color;
  switch(e.type){
    case 'classic':dClassic(col,e.hp<e.maxHp);break;
    case 'fast':dFast(col);break;
    case 'vortex':dVortex(col);break;
    case 'phantom':dPhantom(col,e.alpha??1);break;
    case 'splitter':dSplitter(col,e.hp);break;
    case 'kamikaze':dKamikaze(col,e.diveActive);break;
    case 'shooter':dShooter(col);break;
    case 'nexus':dNexus(col);break;
  }
  ctx.shadowBlur=0;ctx.restore();
}

function p(x,y,w,h){ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function lighter(col){const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);return`rgb(${Math.min(255,r+90)},${Math.min(255,g+90)},${Math.min(255,b+90)})`;}
function darker(col){const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);return`rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;}

function dClassic(col,dmg){
  if(col.length<7)col='#4db8ff';
  const c2=lighter(col),c3=darker(col);
  ctx.fillStyle=c3;
  p(-22,-6,8,8);p(14,-6,8,8);p(-24,0,6,6);p(18,0,6,6);
  ctx.fillStyle=dmg?'#ff3300':col;
  p(-16,-8,6,6);p(10,-8,6,6);p(-18,0,6,8);p(12,0,6,8);
  ctx.fillStyle=c2;
  p(-8,-14,16,6);p(-6,-18,4,4);p(2,-18,4,4);
  ctx.fillStyle=dmg?'#ff3300':col;
  p(-10,-8,20,6);p(-8,-2,16,6);
  ctx.fillStyle=c3;
  p(-6,4,5,4);p(1,4,5,4);p(-8,6,3,4);p(5,6,3,4);
  ctx.fillStyle='#000';p(-6,-12,4,4);p(2,-12,4,4);
  ctx.fillStyle='#ffffaa';p(-5,-11,2,2);p(3,-11,2,2);
  ctx.fillStyle=c3;p(-4,2,3,2);p(1,2,3,2);
}
function dFast(col){
  if(col.length<7)col='#00e5a0';
  const c2=lighter(col),c3=darker(col);
  ctx.fillStyle=col;
  p(-18,-2,8,4);p(10,-2,8,4);p(-20,2,6,4);p(14,2,6,4);p(-16,6,5,4);p(11,6,5,4);
  ctx.fillStyle=c2;p(-20,-2,2,2);p(18,-2,2,2);
  ctx.fillStyle=c3;p(-4,-14,8,4);
  ctx.fillStyle=col;p(-4,-10,8,4);p(-5,-6,10,4);p(-6,-2,12,4);p(-5,2,10,4);
  ctx.fillStyle=c2;p(-2,-8,4,8);
  ctx.fillStyle='#ffff44';p(-3,6,6,4);
  ctx.fillStyle='#fff';p(-1,8,2,2);
  ctx.fillStyle='#000';p(-2,-12,4,4);
  ctx.fillStyle=c2;p(-1,-11,2,2);
}
function dVortex(col){
  if(col.length<7)col='#ff9500';
  const c2=lighter(col),c3=darker(col);
  const r=frame*.055;ctx.save();ctx.rotate(r);
  ctx.fillStyle=c3;
  p(-4,-16,8,4);p(-8,-12,16,4);p(-10,-8,20,4);p(-10,-4,20,4);p(-8,0,16,4);p(-4,4,8,4);
  ctx.fillStyle=col;p(-6,-12,12,4);p(-8,-8,16,4);p(-8,-4,16,4);p(-6,0,12,4);
  ctx.fillStyle=c2;p(-2,-8,4,8);
  ctx.restore();
  ctx.fillStyle=c2;
  for(let i=0;i<3;i++){const a=i/3*Math.PI*2+frame*.055*2.2;p(Math.round(Math.cos(a)*18)-2,Math.round(Math.sin(a)*18)-2,4,4);}
  ctx.fillStyle='#fff';p(-2,-2,4,4);ctx.fillStyle=col;p(-1,-1,2,2);
}
function dPhantom(col,alpha){
  if(col.length<7)col='#cc66ff';
  const c2=lighter(col);
  ctx.save();ctx.globalAlpha*=alpha;
  ctx.fillStyle=col;
  p(-2,-14,4,4);p(-5,-10,10,4);p(-8,-6,16,4);p(-8,-2,16,4);p(-6,2,12,4);p(-4,6,8,4);

// ── Player ────────────────────────────────────
let player,boss;
function initPlayer(){const py=H-clamp(H*0.12,60,100);player={x:W/2,y:py,tx:W/2,ty:py,shootCD:0,triShot:0,rapidFire:0,shield:0};}

// ── Enemies ───────────────────────────────────
const ROW_COLORS=['#ff0','#ff4488','#cc66ff','#ff6622','#00e5a0','#4db8ff'];
let formOffset=0,formDropped=0,diveGroupCooldown=0;
let enemies=[],fDir=1,fDropping=false,fDropLeft=0,waveIdx=0,waveTotal=0;
function buildWave(lvl){
  const lb=1+loopCount*.18;
  const {type,rows,cols,speed,drop,fr}=lvl;
  // Calcular gap para que la formación siempre quepa en pantalla con margen
  const margin=60;
  const maxFormW=W-margin*2;
  // Tamaño enemigo adaptativo: más pequeño en pantallas estrechas
  const ew=Math.round(clamp(W*0.075,24,42)),eh=Math.round(ew*0.85);
  const gx=Math.max(6,Math.floor((maxFormW-cols*ew)/(cols-1||1)));
  const gy=18;
  const tw=cols*ew+(cols-1)*gx;
  const sx=(W-tw)/2;
  const sy=80; // debajo de la banda HUD (64px) + margen de 16px
  const list=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const bx=sx+c*(ew+gx)+ew/2,by=sy+r*(eh+gy)+eh/2;
    const hp=type==='splitter'?2:type==='nexus'?3:1;
    const color=ROW_COLORS[r%ROW_COLORS.length];
    list.push({x:bx,y:by,bx,by,w:ew,h:eh,hp,maxHp:hp,type,color,alive:true,phase:Math.random()*Math.PI*2,
      diveActive:false,divePhase:'out',diveT:0,diveDelay:0,
      diveSX:0,diveSY:0,diveCX1:0,diveCY1:0,diveCX2:0,diveCY2:0,diveTX:0,diveTY:0,
      reentryStartX:0,reentryStartY:0,
      fireRate:fr*lb,speed:speed*lb,drop,flickTimer:0,alpha:1,
      phantomVisible:true,phantomPhase:Math.random()*Math.PI*2,
      waveDelay:(waveIdx===0?Math.floor(Math.random()*60):0),waveAlpha:0});
  }
  return list;
}
function spawnWave(){const lvl=LEVELS[levelIdx];if(lvl.isBoss)return;enemies=[...enemies,...buildWave(lvl)];waveIdx++;}
function initLevel(idx){
  bullets=[];eBullets=[];particles=[];powerups=[];enemies=[];boss=null;
  fDir=1;fDropping=false;fDropLeft=0;waveIdx=0;waveTotal=LEVELS[idx]?.waveCount||3;
  formOffset=0;formDropped=0;diveGroupCooldown=0;
  document.getElementById('boss-wrap').classList.remove('on');
  if(LEVELS[idx].isBoss)spawnBossEntity(LEVELS[idx]);else spawnWave();
  showAnn(idx);updateHUD();
}
function spawnBossEntity(lvl){
  const lb=1+loopCount*.22;
  boss={x:W/2,y:-140,targetY:125,w:155,h:105,hp:Math.floor(200*lb),maxHp:Math.floor(200*lb),

// ── Sonido dive estilo Galaxian ───────────────
function beepDive(){
  if(levelIdx<1)return;
  try{
    const a=ac(),now=a.currentTime;
    [520,488,455,418].forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type='square';o.frequency.setValueAtTime(f,now+i*.055);
      g.gain.setValueAtTime(.09,now+i*.055);g.gain.exponentialRampToValueAtTime(.001,now+i*.055+.05);
      o.connect(g);g.connect(a.destination);o.start(now+i*.055);o.stop(now+i*.055+.06);
    });
    const of=a.createOscillator(),gf=a.createGain();
    of.type='square';of.frequency.setValueAtTime(380,now+4*.055);
    of.frequency.linearRampToValueAtTime(140,now+4*.055+.22);
    gf.gain.setValueAtTime(.08,now+4*.055);gf.gain.exponentialRampToValueAtTime(.001,now+4*.055+.22);
    of.connect(gf);gf.connect(a.destination);of.start(now+4*.055);of.stop(now+4*.055+.24);
  }catch(e){}
}

function tryLaunchDiveGroup(){
  if(levelIdx<1)return;
  if(diveGroupCooldown>0){diveGroupCooldown--;return;}
  if(Math.random()>.005)return;
  const pool=[];
  for(let i=0;i<enemies.length;i++){const e=enemies[i];if(e.alive&&!e.diveActive)pool.push(e);}
  if(pool.length<2)return;
  pool.sort((a,b)=>a.by-b.by);
  const n=Math.min(levelIdx>=4?3:2,pool.length);
  pool.slice(0,n).forEach((e,i)=>{
    e.diveActive=true;e.divePhase='out';e.diveT=0;e.diveDelay=i*22;
    e.diveSX=e.x;e.diveSY=e.y;
    const side=(e.x<W/2)?1:-1;
    e.diveCX1=e.x+side*(100+Math.random()*80);e.diveCY1=e.y+60;
    e.diveCX2=(player?player.x:W/2)+(-40+Math.random()*80);e.diveCY2=H*.55;
    e.diveTX=(player?player.x:W/2)+(-30+Math.random()*60);e.diveTY=H+50;
    e.reentryStartX=e.bx+formOffset+(side*-60);e.reentryStartY=-40;
  });
  beepDive();
  diveGroupCooldown=Math.max(80,220-levelIdx*15)+Math.floor(Math.random()*80);
}

function updateDiveEnemy(e){
  if(e.diveDelay>0){e.diveDelay--;return;}
  if(e.divePhase==='out'){
    e.diveT+=0.008;
    const t=Math.min(e.diveT,1),t1=1-t;
    e.x=t1*t1*t1*e.diveSX+3*t1*t1*t*e.diveCX1+3*t1*t*t*e.diveCX2+t*t*t*e.diveTX;
    e.y=t1*t1*t1*e.diveSY+3*t1*t1*t*e.diveCY1+3*t1*t*t*e.diveCY2+t*t*t*e.diveTY;
    if(t>=1){
      e.divePhase='return';e.diveT=0;
      e.x=e.reentryStartX;e.y=e.reentryStartY;
    }
  } else {
    e.diveT+=0.01;
    const t=Math.min(e.diveT,1),t1=1-t;
    const tx=e.bx+formOffset,ty=e.by+formDropped;
    const cx=(e.reentryStartX+tx)/2,cy=e.reentryStartY-40;
    e.x=t1*t1*e.reentryStartX+2*t1*t*cx+t*t*tx;
    e.y=t1*t1*e.reentryStartY+2*t1*t*cy+t*t*ty;
    if(t>=1){e.diveActive=false;e.diveT=0;e.divePhase='out';e.x=tx;e.y=ty;}
  }
}

// ── Formation movement ─────────────────────────
function moveFormation(){
  const lvl=LEVELS[levelIdx];if(!lvl||lvl.isBoss)return;
  const lb=1+loopCount*.18,spd=lvl.speed*lb*fDir;
  let minX=Infinity,maxX=-Infinity,anyAlive=false;
  for(let i=0;i<enemies.length;i++){const e=enemies[i];if(!e.alive)continue;anyAlive=true;if(!e.diveActive){minX=Math.min(minX,e.x);maxX=Math.max(maxX,e.x);}}
  if(!fDropping&&anyAlive){
    const edgeM=Math.round(clamp(W*0.05,20,50));
    if((fDir>0&&maxX>W-edgeM)||(fDir<0&&minX<edgeM)){
      fDropping=true;fDropLeft=lvl.drop;fDir*=-1;
    }
  }
  const dropStep=Math.max(1,Math.round(H/400)); // 1px en móvil, 2px en desktop
  if(fDropping){fDropLeft-=dropStep*2;if(fDropLeft<=0){fDropping=false;formDropped=0;}}
  formOffset+=spd;
  if(fDropping)formDropped+=dropStep*2;
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.waveDelay>0){e.waveDelay--;e.waveAlpha=Math.min(1,e.waveAlpha+.06);continue;}
    e.waveAlpha=Math.min(1,e.waveAlpha+.03);
    if(e.diveActive){
      updateDiveEnemy(e);
      if(e.divePhase==='out'&&!e.diveDelay&&(e.x-player.x)**2+(e.y-player.y)**2<400){
        e.alive=false;playerHit();spawnBurst(e.x,e.y,e.color,18);beep('xplode');continue;
      }
    } else {
      if(fDropping){e.y+=dropStep*2;e.by+=dropStep*2;} // bajar posición base también para que no vuelvan arriba
      else{
        e.bx+=spd;
        const pat=lvl.pat;
        if(pat==='spiral'){e.x=e.bx+Math.sin(e.phase+frame*.035)*14;e.y=e.by+Math.cos(e.phase+frame*.025)*8;}
        else if(pat==='dive'){e.x=e.bx+Math.sin(e.phase+frame*.04)*8;e.y=e.by+Math.sin(e.phase*2+frame*.035)*6;}
        else{e.x=e.bx;e.y=e.by;}
      }
      if(e.y>H-50){e.alive=false;playerHit();}
    }
    if(e.type==='kamikaze'&&!e.diveActive&&Math.random()<.002){
      e.diveActive=true;e.divePhase='out';e.diveT=0;e.diveDelay=0;
      e.diveSX=e.x;e.diveSY=e.y;
      const side=e.x<W/2?1:-1;
      e.diveCX1=e.x+side*80;e.diveCY1=e.y+50;
      e.diveCX2=(player?player.x:W/2);e.diveCY2=H*.5;
      e.diveTX=(player?player.x:W/2);e.diveTY=H+50;
      e.reentryStartX=e.bx+formOffset+(side*-60);e.reentryStartY=-40;
      beepDive();
    }
    if(e.type==='phantom'){e.phantomPhase+=.042;const sv=Math.sin(e.phantomPhase);e.phantomVisible=sv>-.2;e.alpha=e.phantomVisible?(.52+.48*sv):.1;}
    if(!e.diveActive&&(e.type!=='phantom'||e.phantomVisible)&&Math.random()<e.fireRate)enemyFire(e);
    e.flickTimer=Math.max(0,e.flickTimer-1);
  }
  tryLaunchDiveGroup();
}

function enemyFire(e){
  const aimed=e.type==='shooter'||e.type==='nexus'||e.type==='phantom';
  const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy)||1,spd=4.6+loopCount*.3;
  if(aimed)eBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/d*spd,vy:dy/d*spd,col:e.color,r:4.5});
  else eBullets.push({x:e.x,y:e.y+e.h/2,vx:(Math.random()-.5)*2,vy:spd*(.8+Math.random()*.4),col:e.color,r:4});
}

// ── Boss logic ────────────────────────────────
function updateBoss(){
  if(!boss)return;
  if(boss.entering){boss.y+=(boss.targetY-boss.y)*.032;if(Math.abs(boss.y-boss.targetY)<3)boss.entering=false;return;}
  boss.angle+=.019;boss.patternTimer++;boss.moveTimer++;
  if(boss.hp<boss.maxHp*.4&&!boss.enraged)boss.enraged=true;
  if(boss.moveTimer%(boss.enraged?110:190)===0)boss.targetX=100+Math.random()*(W-200);
  boss.x+=(boss.targetX-boss.x)*.017;boss.x=Math.max(95,Math.min(W-95,boss.x));
  boss.shootTimer++;if(boss.shootTimer>=(boss.enraged?17:30)){boss.shootTimer=0;boss.pattern=(boss.pattern+1)%5;bossFire();}
  updateBossBar();
}
function bossFire(){
  const spd=clamp(H*0.009,4,7)+loopCount*.42;
  const pp=[
    ()=>{for(let i=-2;i<=2;i++)eBullets.push({x:boss.x+i*24,y:boss.y+52,vx:i*1.5,vy:spd*.95,col:boss.color,r:5.5});},
    ()=>{const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.hypot(dx,dy)||1;for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.23;eBullets.push({x:boss.x,y:boss.y+52,vx:Math.cos(a)*spd*1.1,vy:Math.sin(a)*spd*1.1,col:boss.color,r:5});}},
    ()=>{for(let i=0;i<12;i++){const a=i/12*Math.PI*2;eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,col:boss.color,r:5});}},
    ()=>{const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.hypot(dx,dy)||1;eBullets.push({x:boss.x,y:boss.y+52,vx:dx/d*spd*1.6,vy:dy/d*spd*1.6,col:'#ffffff',r:7});},
    ()=>{for(let i=0;i<8;i++){const a=i/8*Math.PI*2+boss.angle;eBullets.push({x:boss.x+Math.cos(a)*36,y:boss.y+Math.sin(a)*36,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,col:boss.color,r:4.5});}},
  ];
  pp[boss.pattern%pp.length]();
}
function updateBossBar(){if(!boss)return;document.getElementById('boss-fill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';}

// ── Input ─────────────────────────────────────
let tX=-1,tY=-1,mX=0,mY=0;
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tX=t.clientX;tY=t.clientY;},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];tX=t.clientX;tY=t.clientY;},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();tX=tY=-1;},{passive:false});
window.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;});

// ── Game logic ────────────────────────────────
const BSPD=Math.round(clamp(H*0.022,10,16)); // relativo a altura de pantalla
function update(){
  if(state!=='playing')return;
  frame++;moveBg();
  const tx=tX>=0?tX:mX,ty=tY>=0?tY:mY;
  player.tx=tx;player.ty=Math.max(H*.45,Math.min(H-clamp(H*0.05,20,40),ty));
  player.x+=(player.tx-player.x)*.17;player.y+=(player.ty-player.y)*.17;
  player.x=Math.max(26,Math.min(W-26,player.x));
  if(player.shootCD>0)player.shootCD--;
  if(player.shootCD===0){
    const cd=player.rapidFire>0?6:12;player.shootCD=cd;
    bullets.push({x:player.x,y:player.y-26,vx:0,vy:-BSPD});
    if(player.triShot>0){bullets.push({x:player.x,y:player.y-20,vx:-3.5,vy:-BSPD+1.3});bullets.push({x:player.x,y:player.y-20,vx:3.5,vy:-BSPD+1.3});}
    beep('shoot');
  }
  if(player.triShot>0)player.triShot--;if(player.rapidFire>0)player.rapidFire--;if(player.shield>0)player.shield--;
  if(invTimer>0){invTimer--;if(!invTimer)invOn=false;}
  if(comboTimer>0){comboTimer--;if(!comboTimer)comboCount=0;}
  if(bonusAnnTimer>0)bonusAnnTimer--;
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});bullets=bullets.filter(b=>b.y>-35&&b.x>-35&&b.x<W+35);
  eBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});eBullets=eBullets.filter(b=>b.y<H+25&&b.y>-35&&b.x>-35&&b.x<W+35);
  for(const p of powerups){p.y+=1.7;p.angle+=.045;if(Math.hypot(p.x-player.x,p.y-player.y)<30){p.dead=true;applyPU(p.type);beep('pu');spawnBurst(p.x,p.y,PU_COL[p.type],10);}}
  powerups=powerups.filter(p=>!p.dead&&p.y<H+35);
  moveFormation();updateBoss();updParticles();
  // bullet hits
  for(const b of bullets){
    if(boss&&!boss.entering&&Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){
      b.dead=true;boss.hp--;spawnSpark(b.x,b.y,boss.color);beep('bh');updateBossBar();
      if(boss.hp<=0){spawnBurst(boss.x,boss.y,boss.color,65);spawnShock(boss.x,boss.y,boss.color);addScore(4000);boss=null;document.getElementById('boss-wrap').classList.remove('on');beep('bigx');beep('lvlup');setTimeout(()=>showLevelModal('complete'),900);state='levelmodal';}
      continue;
    }
    for(const e of enemies){
      if(!e.alive)continue;if(e.type==='phantom'&&!e.phantomVisible)continue;
      if(Math.abs(b.x-e.x)<e.w/2+3&&Math.abs(b.y-e.y)<e.h/2+3){
        b.dead=true;e.hp--;e.flickTimer=7;spawnSpark(b.x,b.y,e.color);
        if(e.hp<=0){e.alive=false;addScore(110+levelIdx*28);addCombo();spawnBurst(e.x,e.y,e.color);beep('xplode');
          if(Math.random()<.03)maybeSpawnPU(e.x,e.y);
          if(e.type==='splitter'){[-16,16].forEach(ox=>{enemies.push({...e,x:e.x+ox,y:e.y,bx:e.x+ox,by:e.y,hp:1,maxHp:1,alive:true,flickTimer:0,type:'fast',speed:e.speed*1.45,waveDelay:0,waveAlpha:1});});}}
        break;
      }
    }
  }
  bullets=bullets.filter(b=>!b.dead);
  for(const b of eBullets){if(Math.hypot(b.x-player.x,b.y-player.y)<18){b.dead=true;playerHit();}}
  eBullets=eBullets.filter(b=>!b.dead);
  const lvl=LEVELS[levelIdx];
  if(!lvl.isBoss&&enemies.filter(e=>e.alive).length===0&&state==='playing'){
    if(waveIdx<waveTotal)spawnWave();
    else{beep('lvlup');setTimeout(()=>showLevelModal('complete'),450);state='levelmodal';}
  }
}

function playerHit(){
  if(invOn)return;
  if(player.shield>0){player.shield=0;invOn=true;invTimer=80;beep('hit');spawnBurst(player.x,player.y,'#44aaff',12);return;}
  lives--;comboCount=0;updateHUD();beep('hit');spawnBurst(player.x,player.y,'#ff4040',24);
  if(lives<=0){state='dead';setTimeout(()=>showLevelModal('gameover'),950);}
  else{invOn=true;invTimer=165;const py=H-clamp(H*0.12,60,100);player.x=W/2;player.y=py;player.tx=W/2;player.ty=py;}
}

function addScore(v){
  const m=comboCount>=5?3:comboCount>=3?2:1;
  score+=v*m*(loopCount+1);
  if(nextBonusIdx<bonusLifeAt.length&&score>=bonusLifeAt[nextBonusIdx]&&lives<MAXLIVES+2){
    lives++;bonusAnnScore=score;bonusAnnTimer=200;nextBonusIdx++;beepBonusLife();spawnBurst(player.x,player.y,'#ff44aa',22);
  }
}
function addCombo(){comboCount++;comboTimer=135;if(comboCount>=3){const el=document.getElementById('combo-pop');document.getElementById('combo-txt').textContent=`×${comboCount} COMBO!`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),700);}}
function applyPU(t){if(t==='trishot')player.triShot=340;else if(t==='rapidfire')player.rapidFire=340;else if(t==='shield')player.shield=460;}
function maybeSpawnPU(x,y){const types=['trishot','rapidfire','shield'],w=[.38,.38,.24];let r=Math.random(),t=0,type='trishot';for(let i=0;i<types.length;i++){t+=w[i];if(r<t){type=types[i];break;}}powerups.push({x,y,type,angle:0,dead:false});}

// ── HUD en canvas ─────────────────────────────
let _scoreStr='0',_lastScore=-1;
function drawHUD(){
  if(score!==_lastScore){_scoreStr=score.toLocaleString();_lastScore=score;}
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,64);
  const LBL="8px 'Press Start 2P',monospace",VAL="16px 'Press Start 2P',monospace";
  const col1='rgba(255,255,255,0.65)',col2='#ffffff';
  const TL=20,TV=48,PAD=18;
  // SCORE
  ctx.textAlign='left';
  ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText('SCORE',PAD,TL);
  ctx.font=VAL;ctx.fillStyle=col2;ctx.fillText(_scoreStr,PAD,TV);
  // LEVEL
  ctx.textAlign='center';
  ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText('LEVEL',W/2,TL);
  ctx.font=VAL;ctx.fillStyle=col2;ctx.fillText(levelIdx+1,W/2,TV);
  if(loopCount>0){ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#f5c842';ctx.fillText('★'.repeat(loopCount),W/2,TV+18);}
  // LIVES
  const maxShow=MAXLIVES+2,sw=22,gap=8,totalW=maxShow*(sw+gap)-gap,sx=W-PAD-totalW;
  ctx.textAlign='left';
  ctx.font=LBL;ctx.fillStyle=col1;ctx.fillText('LIVES',sx,TL);
  for(let i=0;i<maxShow;i++){
    const alive=i<lives,x=sx+i*(sw+gap),y=TV-16;
    ctx.globalAlpha=alive?1:.18;
    ctx.fillStyle='#1a4a7a';ctx.fillRect(x+7,y+14,8,4);ctx.fillRect(x+1,y+9,20,5);ctx.fillRect(x+3,y+4,16,5);
    ctx.fillStyle='#2e7ac0';ctx.fillRect(x+5,y+4,12,5);ctx.fillRect(x+8,y+1,6,5);
    ctx.fillStyle='#4db8ff';ctx.fillRect(x+9,y,4,4);
    ctx.fillStyle='#aaddff';ctx.fillRect(x+10,y+1,2,2);
    ctx.globalAlpha=1;
  }
  // Anuncio vida extra
  if(bonusAnnTimer>0){
    const al=bonusAnnTimer>30?1:bonusAnnTimer/30;
    const sc=bonusAnnTimer>170?1+(200-bonusAnnTimer)*.015:1;
    ctx.save();
    ctx.globalAlpha=al;
    ctx.translate(W/2,H/2-60);ctx.scale(sc,sc);
    ctx.textAlign='center';
    ctx.font="16px 'Press Start 2P',monospace";
    ctx.fillStyle='#ff44aa';
    ctx.fillText('+ VIDA EXTRA +',0,0);
    ctx.font="8px 'Press Start 2P',monospace";
    ctx.fillStyle='rgba(255,180,230,.9)';
    ctx.fillText((bonusAnnScore>=1000000?'1.000.000':'500.000')+' PUNTOS',0,30);
    ctx.restore();
  }
  ctx.restore();
}
function updateHUD(){} // todo en drawHUD()

// ── Announce ──────────────────────────────────
function showAnn(idx){
  const lvl=LEVELS[idx];
  const a=document.getElementById('ann'),sub=document.getElementById('ann-sub'),nm=document.getElementById('ann-name');
  sub.textContent=`SECTOR ${idx+1}${loopCount>0?' — LOOP '+(loopCount+1):''}`;
  nm.textContent=lvl.name;nm.style.color=lvl.color;
  a.classList.add('show');setTimeout(()=>a.classList.remove('show'),2600);
}

// ── Modal ─────────────────────────────────────
function showModal(){document.getElementById('modal').classList.remove('hide');}
function hideModal(){document.getElementById('modal').classList.add('hide');}
function showLevelModal(mode){
  modalMode=mode;
  const el=id=>document.getElementById(id);
  el('m-stars').style.display='none';el('m-scores').style.display='none';
  el('m-info').textContent='';el('m-hi').textContent='';
  el('m-btn2-wrap').style.display='none';
  if(mode==='title'){
    hideModal(); // título se dibuja en canvas
    state='title';
    return;
  } else if(mode==='complete'){
    const nextLvl=LEVELS[levelIdx+1];const isEnd=!nextLvl;
    el('m-label').textContent='SECTOR '+(levelIdx+1)+' LIBERADO';
    if(isEnd){
      loopCount++;
      el('m-title').textContent='LOOP '+(loopCount+1);
      el('m-sub').textContent='TODOS LOS SECTORES SUPERADOS';
      el('m-stars').style.display='flex';el('m-stars').innerHTML='';
      for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);}
    } else {
      el('m-title').textContent=nextLvl.name;
      el('m-sub').textContent='PRÓXIMO: SECTOR '+(levelIdx+2);
    }
    el('m-btn').textContent=isEnd?'▶  CONTINUAR':'▶  SIGUIENTE SECTOR';
  } else if(mode==='gameover'){
    el('m-label').textContent='FIN DE LA MISIÓN';
    el('m-title').textContent='GAME OVER';
    el('m-sub').textContent='SECTOR '+(levelIdx+1)+' — '+(LEVELS[Math.min(levelIdx,LEVELS.length-1)]?.name||'');
    el('m-scores').style.display='block';
    el('m-sval').textContent=score.toLocaleString();
    if(score>hiScore){hiScore=score;localStorage.setItem('galax_hi',hiScore);el('m-hi').textContent='★ NUEVO RÉCORD ★';}
    else if(hiScore>0)el('m-hi').textContent='RÉCORD: '+hiScore.toLocaleString();
    if(loopCount>0){el('m-stars').style.display='flex';el('m-stars').innerHTML='';for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);}}
    el('m-btn').textContent='▶  REINTENTAR';
    el('m-btn2-wrap').style.display='block';
  }
  showModal();
}
function goMenu(){hideModal();initTitleEnemies();showLevelModal('title');}
function modalAction(){
  if(modalMode==='title'){startGame();}
  else if(modalMode==='complete'){hideModal();levelIdx++;if(levelIdx>=LEVELS.length)levelIdx=0;initLevel(levelIdx);updateHUD();state='playing';}
  else if(modalMode==='gameover'){hideModal();startGame();}
}

// ── Title screen canvas ───────────────────────
// Demo enemies que desfilan en la pantalla de título
let titleEnemies=[];
function initTitleEnemies(){
  titleEnemies=[];
  const types=['classic','fast','vortex','phantom','splitter','kamikaze','shooter','nexus'];
  const rowColors=['#ff0','#ff4488','#cc66ff','#ff6622','#00e5a0','#4db8ff','#ff5533','#00ccff'];
  for(let r=0;r<3;r++){
    for(let c=0;c<8;c++){
      // Distribuir por toda la pantalla desde el inicio, no apiñados a la derecha
      titleEnemies.push({
        x: (W/8)*c + W/16,
        y: H*.28+r*56,
        type:types[(r*2+Math.floor(c/2))%8],
        color:rowColors[r],
        phase:Math.random()*Math.PI*2,
        spd:1.2+r*0.2,
        alive:true,flickTimer:0,alpha:1,
        hp:1,maxHp:1
      });
    }
  }
}

function drawTitleScreen(){
  if(state!=='title')return;
  const PF="'Press Start 2P',monospace";

  const logoSize = W<500 ? 32 : W<800 ? 48 : 64;
  const logoY    = 80 + logoSize;
  const subY     = logoY + 28;
  const hiY      = subY + 28;
  const iy       = H*0.62;
  const lineH    = 32;
  const ty       = iy + lineH*2.6;
  const tapY     = H*0.93;

  // ── Logo GALAX ───────────────────────────────────────────────
  ctx.save();
  ctx.textAlign='center';
  ctx.font=logoSize+"px "+PF;
  ctx.shadowColor='#4db8ff'; ctx.shadowBlur=24+12*Math.sin(frame*.05);
  ctx.fillStyle='#4db8ff';
  ctx.fillText('GALAX',W/2+2,logoY+2);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffffff';
  ctx.fillText('GALAX',W/2,logoY);
  const g=ctx.createLinearGradient(W/2-120,0,W/2+120,0);
  g.addColorStop(0,'transparent');g.addColorStop(.5,'rgba(77,184,255,.6)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(W/2-120,logoY+10,240,2);
  ctx.font="8px "+PF;
  ctx.fillStyle='rgba(150,210,255,.9)';
  ctx.fillText('DEEP  SPACE  WARFARE',W/2,subY);
  if(hiScore>0){
    ctx.fillStyle='#f5c842';
    ctx.shadowColor='#f5c842'; ctx.shadowBlur=6;
    ctx.fillText('BEST: '+hiScore.toLocaleString(),W/2,hiY);
    ctx.shadowBlur=0;
  }
  ctx.restore();

  // ── Enemigos entre logo e instrucciones ─────────────────────
  const eTop=hiY+20, eBot=iy-20;
  const nRows=Math.ceil(titleEnemies.length/8);
  const rowH=Math.max((eBot-eTop)/nRows,40);
  for(let i=0;i<titleEnemies.length;i++){
    const e=titleEnemies[i];
    e.x-=e.spd;
    if(e.x<-60)e.x=W+60+Math.random()*100;
    const row=Math.floor(i/8);
    e.y=eTop+rowH*row+rowH/2+Math.sin(frame*.022+e.phase)*8;
    ctx.save(); ctx.translate(e.x,e.y); drawEnemy(e); ctx.restore();
  }

  // ── Instrucciones ────────────────────────────────────────────
  ctx.save();
  ctx.textAlign='center';
  ctx.font="8px "+PF;
  ctx.fillStyle='rgba(200,230,255,.9)';
  ctx.fillText('DESLIZA: MOVER',W/2,iy);
  ctx.fillText('DISPARO: AUTOMATICO',W/2,iy+lineH);
  ctx.fillStyle='rgba(130,180,255,.7)';
  ctx.fillText('-- PUNTOS --',W/2,ty);
  const pts=[['CLASSIC','10'],['FAST/VORTEX','20'],['HUNTER','30'],['FLAGSHIP','60'],['BOSS','600x']];
  const colW=clamp(W*0.22,100,150);
  pts.forEach(([n,v],i)=>{
    const py=ty+22+i*22;
    ctx.textAlign='left';  ctx.fillStyle='rgba(200,225,255,.8)'; ctx.fillText(n,W/2-colW,py);
    ctx.textAlign='right'; ctx.fillStyle='#ffe44d';              ctx.fillText(v,W/2+colW,py);
  });
  ctx.textAlign='center';
  ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(frame*.06));
  ctx.fillStyle='#ffffff';
  ctx.shadowColor='#4db8ff'; ctx.shadowBlur=10;
  ctx.fillText('- TAP TO PLAY -',W/2,tapY);
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.restore();
}

function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

// ── Game start ────────────────────────────────
function startGame(){
  score=0;lives=3;loopCount=0;levelIdx=0;comboCount=0;comboTimer=0;invOn=false;invTimer=0;frame=0;
  nextBonusIdx=0;
  initBg();initPlayer();initLevel(0);state='playing';updateHUD();
}

// ── Render ────────────────────────────────────
function render(){
  const lvl=LEVELS[Math.min(levelIdx,LEVELS.length-1)];
  drawBg(state==='title'?{bg:[0,4,18]}:lvl);
  if(state!=='title')drawHUD();
  if(state==='title'){
    drawTitleScreen();
    return;
  }
  if(state==='playing'||state==='dead'||state==='levelmodal'){
    for(const e of enemies){if(!e.alive)continue;ctx.save();ctx.globalAlpha=e.waveAlpha;drawEnemy(e);ctx.restore();}
    if(boss)drawBossShip(boss);
    drawBullets();drawPowerups();drawParticles();
    if(state!=='dead'&&(!invOn||Math.floor(invTimer/5)%2===0))drawPlayer(player.x,player.y,player.shield>0,player.triShot>0,player.rapidFire>0);
  }
}

function loop(){update();render();requestAnimationFrame(loop);}

// ── Init ──────────────────────────────────────
hiScore=parseInt(localStorage.getItem('galax_hi')||'0');
score=0;lives=3;loopCount=0;levelIdx=0;frame=0;
initBg();initPlayer();bullets=[];eBullets=[];enemies=[];particles=[];powerups=[];
mX=typeof W!=='undefined'?W/2:300;mY=typeof H!=='undefined'?H-90:500;
initTitleEnemies();
// Esperar fuente antes de mostrar título
document.fonts.ready.then(()=>{showLevelModal('title');}).catch(()=>{showLevelModal('title');});

// Click/tap en título arranca el juego
function handleTitleStart(e){
  if(state==='title'){
    if(e.target.id==='m-btn'||e.target.classList.contains('m-btn'))return;
    startGame();
  }
}
C.addEventListener('click', handleTitleStart);
C.addEventListener('touchend', handleTitleStart, {passive:true});
requestAnimationFrame(loop);
</script>
