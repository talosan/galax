<title>DRONE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
canvas{display:block;position:fixed;top:0;left:0;contain:strict;will-change:transform}
#modal{position:fixed;inset:0;background:rgba(0,3,16,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100}
#modal.hide{display:none}
.mbox{border:1px solid rgba(0,229,255,.18);background:linear-gradient(160deg,rgba(0,10,30,.97),rgba(0,3,18,.99));border-radius:16px;padding:clamp(18px,3vw,40px) clamp(20px,4vw,48px);text-align:center;max-width:460px;width:92%;box-shadow:0 0 80px rgba(0,180,255,.08)}
.m-label{font-size:9px;letter-spacing:3px;color:rgba(0,229,255,.7);text-transform:uppercase;margin-bottom:12px}
.m-title{font-size:clamp(16px,4vw,36px);letter-spacing:2px;color:#00e5ff;text-shadow:0 0 24px #00e5ff80;margin-bottom:6px;line-height:1.2}
.m-sub{font-size:8px;letter-spacing:1px;color:rgba(180,240,255,.7);margin-bottom:24px;min-height:14px;line-height:2}
.m-scores{margin-bottom:20px}
.m-score-val{font-size:clamp(16px,3.5vw,26px);color:#fff;letter-spacing:2px;text-shadow:0 0 12px #fff3}
.m-hi{font-size:8px;color:#ffe44d;letter-spacing:1px;margin-top:6px;min-height:14px}
.m-stars{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.m-stars .ls{font-size:18px;color:#ffe44d;text-shadow:0 0 10px #ffe44d}
.m-btn{display:inline-block;background:rgba(0,60,120,.3);border:1.5px solid rgba(0,229,255,.7);color:#e0f8ff;font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:14px 32px;cursor:pointer;text-transform:uppercase;border-radius:6px;box-shadow:0 0 20px rgba(0,229,255,.15);transition:all .2s;min-height:48px}
.m-btn:hover,.m-btn:active{border-color:#00e5ff;background:rgba(0,229,255,.18);box-shadow:0 0 28px rgba(0,229,255,.3);transform:scale(1.04)}
.m-btn2{display:inline-block;background:transparent;border:1px solid rgba(0,229,255,.3);color:rgba(180,240,255,.6);font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;padding:10px 22px;cursor:pointer;text-transform:uppercase;border-radius:6px;margin-top:10px;transition:all .2s;min-height:44px}
.m-btn2:hover,.m-btn2:active{border-color:rgba(0,229,255,.6);color:#a0e8ff;background:rgba(0,229,255,.08)}
.m-div{width:40px;height:1px;background:rgba(0,229,255,.12);margin:14px auto}
.m-info{font-size:8px;letter-spacing:1px;color:rgba(150,220,255,.65);margin-top:12px;line-height:2}
#ann{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:40;opacity:0;transition:opacity .4s}
#ann.show{opacity:1}
.ann-sub{font-size:10px;letter-spacing:6px;color:rgba(0,229,255,.6);margin-bottom:10px}
.ann-name{font-size:clamp(24px,5.5vw,48px);letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 36px currentColor;padding:0 20px;text-align:center}
#boss-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:min(360px,72vw);z-index:20;display:none}
#boss-wrap.on{display:block}
.boss-lbl{font-size:8px;letter-spacing:4px;color:#ff2266;text-shadow:0 0 8px #ff2266;margin-bottom:5px;text-align:center}
.boss-track{height:6px;background:rgba(255,34,102,.12);border:1px solid rgba(255,34,102,.25);border-radius:3px;overflow:hidden}
#boss-fill{height:100%;background:linear-gradient(90deg,#ff0044,#ff8800);border-radius:3px;transition:width .08s}
#ctrl-btns{position:fixed;bottom:clamp(16px,4vh,36px);right:0;display:none;flex-direction:column;gap:0;z-index:30}
#ctrl-btns.on{display:flex}
.ctrl-btn{width:58px;height:58px;background:rgba(0,0,0,.4);border:none;color:rgba(255,255,255,.65);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent;min-width:44px;min-height:44px}
.ctrl-btn:active{background:rgba(0,229,255,.2)}
#pause-overlay{position:fixed;inset:0;background:rgba(0,3,20,.85);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;gap:28px}
#pause-overlay.on{display:flex}
#pause-overlay .p-title{font-size:clamp(22px,5vw,38px);color:#00e5ff;text-shadow:0 0 18px #00e5ff}
#pause-overlay .p-btn{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:16px 36px;background:rgba(0,60,120,.4);border:1.5px solid rgba(0,229,255,.6);color:#e0f8ff;cursor:pointer;border-radius:6px;text-transform:uppercase;min-width:220px;min-height:56px}
#pause-overlay .p-btn:active{background:rgba(0,229,255,.22)}
/* ── Automotive (AAOS) — overlay de "disponible aparcado" ───────────────── */
#aaos-overlay{position:fixed;inset:0;background:rgba(0,3,20,.94);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:24px;padding:40px;text-align:center;pointer-events:auto}
#aaos-overlay.on{display:flex}
#aaos-overlay .ao-icon{font-size:64px;margin-bottom:8px}
#aaos-overlay .ao-title{font-family:'Press Start 2P',monospace;font-size:clamp(18px,4vw,32px);color:#ffaa00;text-shadow:0 0 18px #ffaa00;letter-spacing:2px;line-height:1.4}
#aaos-overlay .ao-sub{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2vw,14px);color:#e0f8ff;letter-spacing:1px;line-height:2;max-width:520px}
/* ── Automotive (AAOS) — touch targets ≥64dp, font ≥24sp (UX-1/2/3) ─────── */
body.aaos .ctrl-btn{width:80px;height:80px;min-width:80px;min-height:80px;font-size:32px;margin:8px}
body.aaos .m-btn{font-size:14px;padding:20px 44px;min-height:72px;letter-spacing:3px}
body.aaos .m-btn2{font-size:12px;padding:16px 32px;min-height:64px}
body.aaos #pause-overlay .p-btn{font-size:14px;padding:22px 48px;min-width:280px;min-height:72px}
body.aaos #pause-overlay{gap:36px}

/* Parade del menú principal: ahora dibujado en canvas, sin DOM */

function detectLang(){const u=new URLSearchParams(window.location.search).get('lang');if(u)return u.split('-')[0].toLowerCase();return(navigator.language||'en').split('-')[0].toLowerCase();}

function resize(){W=window.innerWidth;H=window.innerHeight;DPR=Math.min(window.devicePixelRatio||1,2.5);C.width=Math.round(W*DPR);C.height=Math.round(H*DPR);C.style.width=W+'px';C.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);ctx.imageSmoothingEnabled=false;nebulaCache=null;_titleLogoCache=null;_logoCache=null;_titleGrad=null;}
resize();setTimeout(()=>{resize();initBg();nebulaCache=null;},250);
window.addEventListener('resize',()=>{resize();initBg();nebulaCache=null;});
// Android WebView hooks
window.onResumeGame=function(){setTimeout(()=>{resize();initBg();nebulaCache=null;},100);};
window.canReload=function(){return state==='title';};

// ── Performance: boot mode y recovery post-ad ─────────────────────────────────
// Durante los primeros 2 segundos tras cargar, el motor JIT de Chromium aún
// no ha optimizado funciones hot, y la GPU está calentándose. Reducimos
// temporalmente la carga visual para que el primer impacto al usuario sea
// fluido. Después de 2s, todo vuelve a normalidad con JIT caliente.
let __bootMode=true;
let __adRecoveryFrames=0;
setTimeout(()=>{__bootMode=false;},2000);

// Llamado por Kotlin cuando se cierra un anuncio fullscreen. Entramos en
// modo recovery durante 30 frames (~500ms a 60fps) para dar tiempo a que el
// pipeline GPU recupere texturas y prioridad.
window.onAdClosed=function(){
  __adRecoveryFrames=30;
  // Forzar reconstrucción del cache de nebula al volver del ad (la GPU
  // ha perdido la textura).
  if(typeof nebulaCache!=='undefined')nebulaCache=null;
};

// Helper consultable desde el resto del código del juego para saber si
// debemos reducir efectos. Es ligero y no genera overhead.
window.__shouldReduceFx=function(){
  if(__adRecoveryFrames>0){__adRecoveryFrames--;return true;}
  return __bootMode;
};

// ── Automotive (AAOS) integration ─────────────────────────────────────────────
// Detecta si la app corre en Android Automotive OS consultando al bridge nativo.
// Solo afecta a la rama AAOS — en móvil/TV el flujo es idéntico al original.
const IS_AAOS=(function(){try{return !!(window.GalaxBridge&&window.GalaxBridge.isAutomotive&&window.GalaxBridge.isAutomotive());}catch(e){return false;}})();
if(IS_AAOS){document.body.classList.add('aaos');}
let _drivingNow=false;
function _aaosLocalize(){
  // Localiza el overlay con las traducciones disponibles; si no existen claves
  // específicas, deja el fallback en español que ya está en el HTML.
  try{
    const titleEl=document.getElementById('ao-title');
    const subEl=document.getElementById('ao-sub');
    if(typeof t==='function'){
      const tt=t('aaosParked');const ss=t('aaosParkedSub');
      if(tt&&tt!=='aaosParked')titleEl.textContent=tt;
      if(ss&&ss!=='aaosParkedSub')subEl.textContent=ss;
    }
  }catch(e){}
}
function _showAaosOverlay(){_aaosLocalize();document.getElementById('aaos-overlay').classList.add('on');}
function _hideAaosOverlay(){document.getElementById('aaos-overlay').classList.remove('on');}

// Nuevo callback bidireccional desde el código Kotlin (CarUxRestrictionsManager).
// driving=true  → coche en movimiento: pausar juego, silenciar y mostrar overlay.
// driving=false → coche detenido: ocultar overlay. NO se reanuda automáticamente:
//                 el usuario debe pulsar Continuar.
window.onDrivingStateChanged=function(driving){
  _drivingNow=!!driving;
  if(!IS_AAOS)return; // En móvil/TV ignorar (no debería llegar nunca).
  if(driving){
    // Pausar partida si está en curso
    try{if(state==='playing'&&!isPaused&&typeof togglePause==='function')togglePause();}catch(e){}
    // Cortar audio inmediatamente (DD-3): silenciar drone ambiente
    try{isMuted=true;const mb=document.getElementById('btn-mute');if(mb)mb.textContent='🔇';}catch(e){}
    _showAaosOverlay();
  }else{
    _hideAaosOverlay();
    // El audio queda muted hasta que el usuario lo reactive manualmente.
    // No tocamos isMuted aquí — el usuario decide.
  }
};
// Alias mantenido por compatibilidad con builds anteriores que llamen al hook viejo.
window.onDrivingStarted=function(){window.onDrivingStateChanged(true);};

let AC=null;function ac(){return AC||(AC=new(window.AudioContext||window.webkitAudioContext)());}
let isMuted=false;
function beep(type){if(isMuted)return;try{const a=ac(),now=a.currentTime;
function mkG(v){const g=a.createGain();g.gain.setValueAtTime(v,now);g.connect(a.destination);return g;}
function mkO(tp,f,g){const o=a.createOscillator();o.type=tp;o.frequency.setValueAtTime(f,now);o.connect(g);return o;}
function noise(dur,ft,ff,vol,dec){const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();f.type=ft;f.frequency.value=ff;g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(.0001,now+dec);s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);s.start(now);}
if(type==='shoot'){const g=mkG(.05);const o=mkO('sawtooth',300,g);o.frequency.exponentialRampToValueAtTime(110,now+.07);g.gain.exponentialRampToValueAtTime(.0001,now+.08);o.start(now);o.stop(now+.09);noise(.05,'bandpass',600,.015,.05);}
else if(type==='xplode'){noise(.2,'lowpass',850,.5,.1);noise(.26,'bandpass',180,.3,.26);const g=mkG(.18);const o=mkO('sine',170,g);o.frequency.exponentialRampToValueAtTime(50,now+.2);g.gain.exponentialRampToValueAtTime(.0001,now+.2);o.start(now);o.stop(now+.22);}
else if(type==='hit'){noise(.06,'bandpass',1100,.6,.06);noise(.55,'lowpass',360,.45,.55);const g=mkG(.3);const o=mkO('sawtooth',220,g);o.frequency.exponentialRampToValueAtTime(25,now+.52);g.gain.exponentialRampToValueAtTime(.0001,now+.55);o.start(now);o.stop(now+.56);}
else if(type==='dive'){[480,430,380,320].forEach((f,i)=>{const g=a.createGain();g.connect(a.destination);const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(f,now+i*.06);o.frequency.exponentialRampToValueAtTime(f*.8,now+i*.06+.055);g.gain.setValueAtTime(.09,now+i*.06);g.gain.exponentialRampToValueAtTime(.0001,now+i*.06+.06);o.connect(g);o.start(now+i*.06);o.stop(now+i*.06+.07);});const g=a.createGain();g.connect(a.destination);const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300,now+.26);o.frequency.exponentialRampToValueAtTime(75,now+.58);g.gain.setValueAtTime(.11,now+.26);g.gain.exponentialRampToValueAtTime(.0001,now+.58);o.connect(g);o.start(now+.26);o.stop(now+.6);}
else if(type==='lvlup'){[[0,330],[.1,392],[.2,524],[.34,660],[.48,784]].forEach(([d,f])=>{const g=a.createGain();g.connect(a.destination);const o=a.createOscillator();o.type='square';o.frequency.setValueAtTime(f,now+d);g.gain.setValueAtTime(.07,now+d);g.gain.exponentialRampToValueAtTime(.0001,now+d+.12);o.connect(g);o.start(now+d);o.stop(now+d+.14);});}
else if(type==='bigx'){noise(.5,'lowpass',580,.65,.45);noise(.5,'bandpass',110,.55,.5);const g=mkG(.36);const o=mkO('sawtooth',200,g);o.frequency.exponentialRampToValueAtTime(28,now+.48);g.gain.exponentialRampToValueAtTime(.0001,now+.5);o.start(now);o.stop(now+.52);}
else if(type==='bh'){const g=mkG(.14);const o=mkO('sawtooth',260,g);o.frequency.exponentialRampToValueAtTime(85,now+.1);g.gain.exponentialRampToValueAtTime(.0001,now+.1);o.start(now);o.stop(now+.12);noise(.07,'bandpass',1700,.08,.07);}
else if(type==='pu'){[0,.07,.14,.22].forEach((d,i)=>{const g=a.createGain();g.connect(a.destination);const o=a.createOscillator();o.type='sine';o.frequency.setValueAtTime([440,550,660,880][i],now+d);g.gain.setValueAtTime(.1,now+d);g.gain.exponentialRampToValueAtTime(.0001,now+d+.11);o.connect(g);o.start(now+d);o.stop(now+d+.13);});}
else if(type==='bonuslife'){try{[[0,330,.08],[.1,440,.08],[.2,550,.08],[.32,660,.1],[.46,880,.15],[.62,660,.07],[.72,880,.22]].forEach(([td,f,dur])=>{const o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.setValueAtTime(f,now+td);g.gain.setValueAtTime(.12,now+td);g.gain.exponentialRampToValueAtTime(.001,now+td+dur);o.connect(g);g.connect(a.destination);o.start(now+td);o.stop(now+td+dur+.02);});}catch(e){}}
}catch(e){}}

// ── Ambient drone + swoop (add-on, puramente aditivo) ────────────────────────
// Drone de fondo con estética "avispa" (misteriosa) como base única en todos
// los niveles, con variaciones muy sutiles por nivel. Volumen uniforme y bajo.
// Además, "piuuuuu" estilo Namco Galaxian cuando cada nave entra en picado.
// No modifica nada del código original.
(function(){
  let droneNodes=null; // {master:GainNode, sources:[OscillatorNode,...]}
  let droneLevelIdx=-1;
  let swoopSeen=new WeakSet();
  // Cajas de reward ya soltadas durante el combate actual del boss (evita duplicados).
  // Cada entrada representa un umbral de HP (.75, .50, .25) ya cruzado.
  let bossPuCurrent=null; // referencia al objeto boss actual (para resetear al cambiar)
  let bossPuDone=new Set();

  // Base común: todos los niveles comparten la topología del preset WASP
  // (dos sawtooth desafinados → bandpass resonante → master), con un vibrato
  // rápido que da el carácter "avispa" y un LFO lento del filtro (misterio).
  //
  // Parámetros por nivel: [baseF, detune, lfoRate, lfoDepth, filtCut, filtQ, filtLfoRate, filtLfoDepth]
  //   baseF        frecuencia fundamental (Hz)
  //   detune       detune de la 2ª voz (cents)
  //   lfoRate      velocidad vibrato (Hz) — el "zumbido"
  //   lfoDepth     profundidad vibrato (Hz)
  //   filtCut      centro bandpass (Hz)
  //   filtQ        resonancia
  //   filtLfoRate  velocidad barrido filtro (Hz)
  //   filtLfoDepth profundidad barrido filtro (Hz)
  const DRONE_PARAMS={
    // 0 DRONE — vibrato más lento y contenido, filtro algo más grave
    drone:    [62, -10, 4.2, 2.8, 340, 6, 0.18, 120],
    // 1 WASP — el preset de referencia (sector 2, "avispa")
    wasp:     [68, -14, 5.5, 3.5, 380, 6, 0.22, 140],
    // 2 VORTEX — LFO del filtro más profundo, sensación espiral
    vortex:   [66, -12, 5.0, 3.2, 400, 6, 0.16, 180],
    // 3 PHANTOM — detune mayor, beating espectral
    phantom:  [64, -18, 4.6, 3.0, 370, 7, 0.13, 150],
    // 4 SPLIT — detune casi simétrico hacia arriba
    split:    [70,  12, 5.2, 3.3, 390, 6, 0.20, 140],
    // 5 KAMI — vibrato más rápido, más nervioso
    kami:     [72, -14, 6.2, 3.8, 400, 6, 0.24, 150],
    // 6 SHOOTER — filtro un poco más cerrado, timbre más cálido
    shooter:  [60, -12, 5.0, 3.0, 350, 7, 0.19, 130],
    // 7 NEXUS — filtro más abierto, carácter espacial
    nexus:    [64, -10, 4.8, 3.0, 430, 5, 0.14, 160],
    // 8 INFERNO — ligera tensión, vibrato rápido, Q alto
    inferno:  [70, -16, 6.0, 3.6, 390, 7, 0.26, 150],
    // 9 OBLIVION — más grave, más lento, profundo
    oblivion: [52, -14, 4.0, 2.6, 330, 7, 0.12, 140],
    // 10 BOSS — grave, vibrato lento, filtro amplio. MISMO volumen que el resto.
    boss:     [56, -18, 4.4, 3.2, 360, 7, 0.15, 170]
  };

  function makeDrone(a,t0,lp,p){
    const [baseF,detune,lfoRate,lfoDepth,filtCut,filtQ,filtLfoRate,filtLfoDepth]=p;
    // Volumen idéntico en todos los niveles — sutil, de fondo real
    const VOL=0.014;
    const master=a.createGain();
    master.gain.setValueAtTime(0,t0);
    master.gain.linearRampToValueAtTime(VOL,t0+1.3);
    master.connect(a.destination);
    // Filtro bandpass (el que da el carácter misterioso de la avispa)
    const filt=a.createBiquadFilter();filt.type='bandpass';filt.frequency.value=filtCut;filt.Q.value=filtQ;filt.connect(master);
    const f=baseF+lp*1.3;
    // Dos voces sawtooth desafinadas
    const o1=a.createOscillator();o1.type='sawtooth';o1.frequency.value=f;o1.connect(filt);
    const o2=a.createOscillator();o2.type='sawtooth';o2.frequency.value=f;o2.detune.value=detune;o2.connect(filt);
    // Vibrato rápido sobre ambas voces (alma del sonido avispa)
    const lfo=a.createOscillator();lfo.type='sine';lfo.frequency.value=lfoRate;
    const lfoG=a.createGain();lfoG.gain.value=lfoDepth;
    lfo.connect(lfoG);lfoG.connect(o1.frequency);lfoG.connect(o2.frequency);
    // Barrido lento del filtro (misterio)
    const fLfo=a.createOscillator();fLfo.type='sine';fLfo.frequency.value=filtLfoRate;
    const fLfoG=a.createGain();fLfoG.gain.value=filtLfoDepth;
    fLfo.connect(fLfoG);fLfoG.connect(filt.frequency);
    const srcs=[o1,o2,lfo,fLfo];srcs.forEach(s=>s.start(t0));
    return{master,sources:srcs};
  }

  // Mapeo de índice de nivel → clave de preset (sigue el orden de LEVELS[].nameKey)
  const DRONE_MAP=['drone','wasp','vortex','phantom','split','kami','shooter','nexus','inferno','oblivion','boss'];

  function startDrone(){
    try{
      const a=ac();
      stopDrone();
      const lv=(typeof levelIdx==='number')?levelIdx:0;
      const lp=(typeof loopCount==='number')?loopCount:0;
      // Detectar boss por flag isBoss (robusto ante cambios de orden)
      let key=DRONE_MAP[lv]||'wasp';
      try{if(typeof LEVELS!=='undefined'&&LEVELS[lv]&&LEVELS[lv].isBoss)key='boss';}catch(e){}
      const params=DRONE_PARAMS[key]||DRONE_PARAMS.wasp;
      const t0=a.currentTime;
      droneNodes=makeDrone(a,t0,lp,params);
      droneLevelIdx=lv;
    }catch(e){}
  }
  function stopDrone(){
    if(!droneNodes)return;
    try{
      const a=ac(),t=a.currentTime;
      droneNodes.master.gain.cancelScheduledValues(t);
      droneNodes.master.gain.setValueAtTime(droneNodes.master.gain.value,t);
      droneNodes.master.gain.linearRampToValueAtTime(0,t+0.4);
      const srcs=droneNodes.sources||[];
      setTimeout(()=>{for(const s of srcs){try{s.stop();}catch(e){}}},600);
    }catch(e){}
    droneNodes=null;droneLevelIdx=-1;
  }

  // "Piuuuuu" estilo Galaxian: barrido rápido de agudo a grave, con cuerpo
  function swoop(){
    if(typeof isMuted!=='undefined'&&isMuted)return;
    try{
      const a=ac(),now=a.currentTime;
      // Voz 1: sawtooth barrido 1800 -> 180 Hz
      const g1=a.createGain();g1.gain.setValueAtTime(.0001,now);
      g1.gain.exponentialRampToValueAtTime(.11,now+.015);
      g1.gain.exponentialRampToValueAtTime(.0001,now+.55);
      const o1=a.createOscillator();o1.type='sawtooth';
      o1.frequency.setValueAtTime(1800,now);
      o1.frequency.exponentialRampToValueAtTime(180,now+.5);
      const f1=a.createBiquadFilter();f1.type='lowpass';f1.frequency.value=3200;f1.Q.value=2;
      o1.connect(f1);f1.connect(g1);g1.connect(a.destination);
      o1.start(now);o1.stop(now+.58);

      // Voz 2: square una quinta por debajo para dar cuerpo
      const g2=a.createGain();g2.gain.setValueAtTime(.0001,now);
      g2.gain.exponentialRampToValueAtTime(.05,now+.02);
      g2.gain.exponentialRampToValueAtTime(.0001,now+.5);
      const o2=a.createOscillator();o2.type='square';
      o2.frequency.setValueAtTime(1200,now);
      o2.frequency.exponentialRampToValueAtTime(120,now+.48);
      o2.connect(g2);g2.connect(a.destination);
      o2.start(now);o2.stop(now+.52);
    }catch(e){}
  }

  // Tick de audio ambiente y eventos sonoros.
  // ANTES: se ejecutaba a 60+fps con requestAnimationFrame, compitiendo con
  // el game loop principal. El trabajo real (gestión drone, detección de
  // picados, drop de cajas en boss) NO necesita ejecutarse cada frame —
  // 4 veces por segundo es más que suficiente, imperceptible al oído.
  // AHORA: setInterval cada 250ms. Libera el main thread y elimina jitter
  // del game loop principal.
  function ambientTick(){
    try{
      const playing=(typeof state!=='undefined'&&state==='playing');
      const paused=(typeof isPaused!=='undefined'&&isPaused);
      const muted=(typeof isMuted!=='undefined'&&isMuted);
      const active=playing && !paused && !muted;

      // Gestión del drone (arranque / parada / cambio de nivel)
      if(active){
        const lv=(typeof levelIdx==='number')?levelIdx:0;
        if(!droneNodes) startDrone();
        else if(lv!==droneLevelIdx) startDrone();
      }else{
        if(droneNodes) stopDrone();
      }

      // Detección de inicio de picado real (piuuuuu por nave)
      if(active && typeof enemies!=='undefined' && Array.isArray(enemies)){
        for(const e of enemies){
          if(!e||!e.alive)continue;
          if(e.diveActive && e.divePhase==='out' && (!e.diveDelay||e.diveDelay<=0)){
            if(!swoopSeen.has(e)){swoopSeen.add(e);swoop();}
          }else if(!e.diveActive && swoopSeen.has(e)){
            swoopSeen.delete(e);
          }
        }
      }

      // Cajas de reward durante el combate del boss.
      // En los niveles normales las cajas salen al matar enemigos (~3.5% por muerte),
      // pero el boss es un solo enemigo y el combate es largo — se quedaba sin cajas.
      // Soltamos 3 cajas fijas en umbrales de HP: 75%, 50% y 25% de vida restante.
      try{
        const b=(typeof boss!=='undefined')?boss:null;
        if(active && b && !b.entering && typeof bossDying!=='undefined' && !bossDying){
          // Reset de estado si cambia el boss (reinicio de nivel, o nuevo combate)
          if(bossPuCurrent!==b){bossPuCurrent=b;bossPuDone.clear();}
          const hpRatio=b.hp/b.maxHp;
          const thresholds=[.75,.50,.25];
          for(const th of thresholds){
            if(!bossPuDone.has(th) && hpRatio<=th){
              bossPuDone.add(th);
              // Elegir tipo con la misma distribución que maybeSpawnPU
              const types=['tri','rapid','shield'],wts=[.4,.4,.2];
              let r=Math.random(),tp='tri';
              for(let i=0;i<types.length;i++){r-=wts[i];if(r<=0){tp=types[i];break;}}
              // Pequeño offset para que no caiga siempre en el mismo sitio
              const ox=(Math.random()-.5)*60;
              const oy=(Math.random()-.5)*20;
              if(typeof powerups!=='undefined'&&Array.isArray(powerups)){
                powerups.push({x:b.x+ox,y:b.y+oy,type:tp,angle:0,dead:false});
              }
              break; // máximo una caja por tick aunque se crucen dos umbrales a la vez
            }
          }
        }else if(!b){
          // Limpieza cuando no hay boss (p. ej. entre niveles)
          if(bossPuCurrent){bossPuCurrent=null;bossPuDone.clear();}
        }
      }catch(e){}
    }catch(e){}
  }
  // setInterval cada 250ms (4 ticks/segundo). Suficiente para audio y eventos.
  setInterval(ambientTick, 250);
})();

// ── Background ────────────────────────────────────────────────────────────────
let stars=[],nebula=[];
function initBg(){stars=[];[[100,.25,.7],[60,.6,1.1],[24,1.4,1.8]].forEach(([n,spd,r])=>{for(let i=0;i<n;i++){const al=Math.random()*.7+.3;stars.push({x:Math.random()*W,y:Math.random()*H,r:r*(Math.random()*.5+.8),spd:spd*(Math.random()*.4+.8),col:r>1.2?`rgba(255,240,200,${al.toFixed(2)})`:`rgba(160,200,255,${al.toFixed(2)})`});}});nebula=[[200,260],[280,300],[180,200],[320,180],[120,280]].map(([hue])=>({x:Math.random()*W,y:Math.random()*H,rx:120+Math.random()*160,ry:60+Math.random()*100,hue,alpha:.02+Math.random()*.016}));}
function moveBg(dt){const wf=state==='playing'?1+levelIdx*.06:1;for(const s of stars){s.y+=s.spd*wf*dt;if(s.y>H+4){s.y=-4;s.x=Math.random()*W;}}}
function buildNebula(bg){const key=bg.join(',');if(nebulaCache&&nebulaBg===key)return;nebulaBg=key;const nc=document.createElement('canvas');nc.width=W;nc.height=H;const c2=nc.getContext('2d');c2.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`;c2.fillRect(0,0,W,H);for(const n of nebula){const sc=Math.max(n.rx,n.ry);c2.save();c2.scale(n.rx/sc,n.ry/sc);const gx=n.x*(sc/n.rx),gy=n.y*(sc/n.ry);const g=c2.createRadialGradient(gx,gy,0,gx,gy,sc);g.addColorStop(0,`hsla(${n.hue},70%,50%,${n.alpha*1.8})`);g.addColorStop(1,`hsla(${n.hue},70%,35%,0)`);c2.fillStyle=g;c2.beginPath();c2.arc(gx,gy,sc,0,Math.PI*2);c2.fill();c2.restore();}nebulaCache=nc;}
function drawBg(lvl){const bg=lvl&&lvl.isBoss?[15,0,12]:(lvl&&lvl.bg||[0,4,18]);if(window.__shouldReduceFx&&window.__shouldReduceFx()){ctx.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`;ctx.fillRect(0,0,W,H);for(const s of stars){const sz=Math.max(1,Math.round(s.r));ctx.fillStyle=s.col;ctx.fillRect(s.x|0,s.y|0,sz,sz);}return;}buildNebula(bg);ctx.drawImage(nebulaCache,0,0);for(const s of stars){const sz=Math.max(1,Math.round(s.r));ctx.fillStyle=s.col;ctx.fillRect(s.x|0,s.y|0,sz,sz);}}

// ── Drawing helpers ───────────────────────────────────────────────────────────
function p(x,y,w,h){ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function lighter(c){const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`rgb(${Math.min(255,r+90)},${Math.min(255,g+90)},${Math.min(255,b+90)})`;}
function darker(c){const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;}
let spriteScale=1;

// ── Sistema de paleta premium ─────────────────────────────────────────────
// Cada sprite declara sus colores por "slot" semántico (deepest, dark, mid,
// bright, highlight, accent). Cuando se está dibujando un enemigo premium,
// _activePalette está definido y PAL() devuelve el color de la paleta.
// Si no, PAL devuelve el color original (fallback).
let _activePalette=null;
// Paleta dorada — usada cuando el color base del sprite NO es amarillento
const PALETTE_GOLD={
  deepest:  '#3a1a00', // tonos muy oscuros (azul oscuro, morado oscuro, rojo oscuro)
  dark:     '#8b4500', // tonos oscuros (rojos intermedios, azules marinos)
  mid:      '#ffaa00', // tonos medios
  bright:   '#ffdd00', // tonos brillantes (amarillo arcade)
  highlight:'#fff4a0', // highlights (cremas, casi blanco)
  accent:   '#ff8800', // detalles pequeños (ojos, destellos)
  black:    '#1a0a00', // negro reemplazable por marrón muy oscuro
  white:    '#fff4a0'  // blanco reemplazable por crema
};
// Paleta cian eléctrico — usada cuando el color base del sprite es amarillento (ej. kami)
const PALETTE_CYAN={
  deepest:  '#001d2d',
  dark:     '#006080',
  mid:      '#00aabb',
  bright:   '#00ffff',
  highlight:'#d0ffff',
  accent:   '#33ddff',
  black:    '#001020',
  white:    '#d0ffff'
};
// PAL: devuelve el color de la paleta activa o el fallback.
// FAST PATH crítico para rendimiento: cuando _activePalette es null (caso normal
// para 95% de los enemigos), evitamos cualquier indirección. V8 puede inlinear
// esta función y eliminar la rama, dejando el coste equivalente a `return fallback`.
// Solo cuando hay paleta activa (enemigos premium de fila superior) hace lookup real.
function PAL(slot,fallback){
  // Fast path: paleta null → coste mínimo equivalente a una asignación directa.
  if(_activePalette===null)return fallback;
  // Slow path: solo se ejecuta para enemigos premium.
  return _activePalette[slot]||fallback;
}

// ── Enemy sprites — paleta multi-color fija por tipo ─────────────────────────
function drawEnemyAt(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  if(spriteScale!==1)ctx.scale(spriteScale,spriteScale);
  // Compensación de tamaños: cada sprite tiene un bounding box original distinto
  // (kami=20x26, split=24x28, oblivion=56x56...). Aplicamos un factor por tipo
  // para que todos se vean con un tamaño visual similar al del drone (nivel 1).
  const _ts=TYPE_VIS_SCALE[e.type];if(_ts)ctx.scale(_ts,_ts);
  const fl=e.flickTimer>0?(e.flickTimer%2===0?.2:1):(e.alpha!=null?e.alpha:1);
  ctx.globalAlpha*=fl;
  // Si el enemigo es premium, activar la paleta correspondiente.
  // Regla pedida por el usuario: dorada cuando el sprite base NO es amarillento,
  // cian cuando el sprite base SÍ es amarillento (kami). premiumColor() ya devuelve
  // '#ffdd00' (gold) o '#00ffff' (cyan) — lo usamos para seleccionar la paleta.
  if(e.isPremium){
    _activePalette=(e.color==='#00ffff')?PALETTE_CYAN:PALETTE_GOLD;
  }
  switch(e.type){
    case 'drone':dDrone(e.hp<e.maxHp);break;
    case 'wasp':dWasp();break;
    case 'vortex':dVortex();break;
    case 'phantom':dPhantom(e.alpha!=null?e.alpha:1);break;
    case 'split':dSplit(e.hp);break;
    case 'kami':dKami(e.diveActive);break;
    case 'shooter':dShooter();break;
    case 'nexus':dNexus(e.hp<e.maxHp);break;
    case 'inferno':dInferno();break;
    case 'oblivion':dOblivion();break;
  }
  _activePalette=null;
  ctx.restore();
}

// DRONE — rojo+azul como Galaxian fila inferior (más abundante)
function dDrone(dmg){
  ctx.fillStyle=(_activePalette===null?'#1a44cc':_activePalette.deepest||'#1a44cc');p(-22,-6,8,8);p(14,-6,8,8);p(-24,0,6,6);p(18,0,6,6); // alas externas
  ctx.fillStyle=dmg?'#ff6600':(_activePalette===null?'#cc2200':_activePalette.dark||'#cc2200');p(-16,-8,6,6);p(10,-8,6,6);p(-18,0,6,8);p(12,0,6,8); // alas internas
  ctx.fillStyle=(_activePalette===null?'#4488ff':_activePalette.mid||'#4488ff');p(-8,-14,16,6);p(-6,-18,4,4);p(2,-18,4,4); // cuerpo superior
  ctx.fillStyle=dmg?'#ff6600':(_activePalette===null?'#dd3300':_activePalette.bright||'#dd3300');p(-10,-8,20,6);p(-8,-2,16,6); // cuerpo central
  ctx.fillStyle=(_activePalette===null?'#2255bb':_activePalette.deepest||'#2255bb');p(-6,4,5,4);p(1,4,5,4);p(-8,6,3,4);p(5,6,3,4); // tren
  ctx.fillStyle=(_activePalette===null?'#000':_activePalette.black||'#000');p(-6,-12,4,4);p(2,-12,4,4);
  ctx.fillStyle=(_activePalette===null?'#ffee88':_activePalette.highlight||'#ffee88');p(-5,-11,2,2);p(3,-11,2,2); // ojos
}

function dWasp(){
  ctx.fillStyle=(_activePalette===null?'#cc3300':_activePalette.dark||'#cc3300');p(-18,-2,8,4);p(10,-2,8,4);p(-20,2,6,4);p(14,2,6,4);p(-16,6,5,4);p(11,6,5,4);
  ctx.fillStyle=(_activePalette===null?'#ff6622':_activePalette.mid||'#ff6622');p(-20,-2,2,2);p(18,-2,2,2); // puntas
  ctx.fillStyle=(_activePalette===null?'#881100':_activePalette.deepest||'#881100');p(-4,-14,8,4); // pico oscuro
  ctx.fillStyle=(_activePalette===null?'#dd2200':_activePalette.dark||'#dd2200');p(-4,-10,8,4);p(-5,-6,10,4);p(-6,-2,12,4);p(-5,2,10,4);
  ctx.fillStyle=(_activePalette===null?'#ff8844':_activePalette.mid||'#ff8844');p(-2,-8,4,8); // franja central
  ctx.fillStyle=(_activePalette===null?'#ffdd00':_activePalette.bright||'#ffdd00');p(-3,6,6,4); // motor

// VORTEX — naranja+amarillo, girador
function dVortex(){
  const r=frame*.055;ctx.save();ctx.rotate(r);
  ctx.fillStyle=(_activePalette===null?'#993300':_activePalette.deepest||'#993300');p(-4,-16,8,4);p(-8,-12,16,4);p(-10,-8,20,4);p(-10,-4,20,4);p(-8,0,16,4);p(-4,4,8,4);
  ctx.fillStyle=(_activePalette===null?'#ff6600':_activePalette.mid||'#ff6600');p(-6,-12,12,4);p(-8,-8,16,4);p(-8,-4,16,4);p(-6,0,12,4);
  ctx.fillStyle=(_activePalette===null?'#ffaa00':_activePalette.bright||'#ffaa00');p(-2,-8,4,8); // núcleo
  ctx.restore();
  ctx.fillStyle=(_activePalette===null?'#ffcc00':_activePalette.bright||'#ffcc00');
  for(let i=0;i<3;i++){const a=i/3*Math.PI*2+frame*.055*2.2;p(Math.round(Math.cos(a)*18)-2,Math.round(Math.sin(a)*18)-2,4,4);}
  ctx.fillStyle=(_activePalette===null?'#fff':_activePalette.highlight||'#fff');p(-2,-2,4,4);ctx.fillStyle=(_activePalette===null?'#ff8800':_activePalette.accent||'#ff8800');p(-1,-1,2,2);
}

// PHANTOM — purpura+amarillo+blanco
function dPhantom(alpha){
  ctx.save();ctx.globalAlpha*=alpha;
  ctx.fillStyle=(_activePalette===null?'#6600bb':_activePalette.deepest||'#6600bb');p(-2,-14,4,4);p(-5,-10,10,4);p(-8,-6,16,4);p(-8,-2,16,4);p(-6,2,12,4);p(-4,6,8,4);
  ctx.fillStyle=(_activePalette===null?'#ffdd00':_activePalette.bright||'#ffdd00');p(-14,-4,6,4);p(8,-4,6,4);
  ctx.fillStyle=(_activePalette===null?'#ffffff':_activePalette.white||'#ffffff');p(-4,-10,8,4);p(-16,0,4,4);p(12,0,4,4);
  ctx.restore();
  ctx.fillStyle=(_activePalette===null?'#ffff88':_activePalette.highlight||'#ffff88');p(-5,-8,4,4);p(1,-8,4,4);
  ctx.fillStyle=(_activePalette===null?'#ff00cc':_activePalette.accent||'#ff00cc');p(-4,-7,2,2);p(2,-7,2,2);
  if(frame%2===0){ctx.strokeStyle=(_activePalette===null?'#aa44ff':_activePalette.mid||'#aa44ff')+'99';ctx.lineWidth=1.5;const tf=frame*.09;[-5,5].forEach((x,i)=>{ctx.beginPath();ctx.moveTo(x,8);ctx.quadraticCurveTo(x+Math.sin(tf+i)*5,15,x+Math.sin(tf+i)*3,22);ctx.stroke();});}

// NEXUS — cian+blanco intacto, naranja+rojo danado
function dNexus(dmg){
  const r=frame*.032;
  const c1=dmg?'#cc4400':(_activePalette===null?'#0088aa':_activePalette.dark||'#0088aa');
  const c2=dmg?'#ff6600':(_activePalette===null?'#00ddff':_activePalette.bright||'#00ddff');
  const c3=dmg?'#ff2200':(_activePalette===null?'#aaffff':_activePalette.highlight||'#aaffff');

  ctx.fillStyle=c1;for(let i=0;i<8;i++){const a=i/8*Math.PI*2;p(Math.round(Math.cos(a)*18)-2,Math.round(Math.sin(a)*18)-2,4,4);}

// ── Object Pools ──────────────────────────────────────────────────────────────
// Antes: bullets/eBullets/particles/scorePopups eran arrays normales con
//   push() y splice() durante gameplay. Eso generaba allocaciones y
//   forzaba al GC a correr cada pocos segundos = microcortes visibles.
// Ahora: arrays pre-alocados con tamaño fijo. Cada slot tiene flag .alive.
//   Para "spawn" buscamos slot libre (alive=false). Para "kill" ponemos
//   alive=false. Cero allocaciones, cero GC.
//
// IMPORTANTE: el código de iteración sigue siendo `for(const x of array)`
// pero ahora cada función SKIP slots con alive=false. Funcionalmente
// idéntico al comportamiento anterior.

const POOL_BULLETS=64;
const POOL_EBULLETS=160;
const POOL_PARTICLES=120;
const POOL_SCOREPOPUPS=24;

// Helper: crea pool con N slots y prepara propiedades.
function makePool(n,factory){
  const a=new Array(n);
  for(let i=0;i<n;i++){a[i]=factory();a[i].alive=false;}
  return a;
}

// Pool de bullets del jugador
let bullets=makePool(POOL_BULLETS,()=>({x:0,y:0,vx:0,vy:0,dead:false,alive:false}));

// Pool de bullets de enemigos
let eBullets=makePool(POOL_EBULLETS,()=>({x:0,y:0,vx:0,vy:0,col:'#fff',r:3.5,dead:false,alive:false}));

// Pool de partículas
let particles=makePool(POOL_PARTICLES,()=>({x:0,y:0,vx:0,vy:0,r:1,col:'#fff',alpha:1,decay:.02,shock:false,alive:false}));

// Pool de score popups
let scorePopups=makePool(POOL_SCOREPOPUPS,()=>({x:0,y:0,pts:0,col:'#fff',alpha:1,vy:-1.2,life:85,alive:false}));

// Helper: busca slot libre en un pool. Si no encuentra, sobrescribe el slot 0
// (oldest-first). Esto NUNCA falla, garantiza que spawn siempre devuelve un slot.
function poolAcquire(pool){
  for(let i=0;i<pool.length;i++){if(!pool[i].alive){return pool[i];}}
  // Pool lleno: reusar el más antiguo (slot 0). Caso raro, solo en stress test.
  return pool[0];
}

// Helper: cuenta slots vivos (para draws condicionales como "if(scorePopups.length)")
function poolAliveCount(pool){
  let c=0;
  for(let i=0;i<pool.length;i++)if(pool[i].alive)c++;
  return c;
}

// ── Bullets ───────────────────────────────────────────────────────────────────
// Helpers de spawn que usan el pool en vez de push().
function spawnBullet(x,y,vx,vy){
  const b=poolAcquire(bullets);
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.dead=false;b.alive=true;
}
function spawnEBullet(x,y,vx,vy,col,r){
  const b=poolAcquire(eBullets);
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.col=col;b.r=r;b.dead=false;b.alive=true;
}

function drawBullets(){
  ctx.fillStyle='#88ddff';
  for(let i=0;i<bullets.length;i++){const b=bullets[i];if(!b.alive)continue;ctx.fillRect(b.x-2,b.y-10,4,16);}
  ctx.fillStyle='#ffffff';
  for(let i=0;i<bullets.length;i++){const b=bullets[i];if(!b.alive)continue;ctx.fillRect(b.x-1,b.y-8,2,8);}
  // eBullets: dibujar en dos pasadas (sin allocar objeto byCol). Primera
  // pasada agrupa por color usando cambios de fillStyle (no óptimo pero
  // evita allocación de objeto).
  for(let i=0;i<eBullets.length;i++){
    const b=eBullets[i];if(!b.alive)continue;
    ctx.fillStyle=b.col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r||3.5,0,Math.PI*2);ctx.fill();
  }
  // Highlight blanco en cada eBullet
  ctx.fillStyle='rgba(255,255,255,.65)';
  for(let i=0;i<eBullets.length;i++){
    const b=eBullets[i];if(!b.alive)continue;
    const r=(b.r||3.5)*.35;
    ctx.beginPath();ctx.arc(b.x-r*.3,b.y-r*.3,r,0,Math.PI*2);ctx.fill();
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnBurst(x,y,col,n){

    const a=Math.random()*Math.PI*2,spd=(Math.random()*5+1)*ps;
    const p=poolAcquire(particles);
    p.x=x;p.y=y;p.vx=Math.cos(a)*spd;p.vy=Math.sin(a)*spd;
    p.r=(Math.random()*3.5+1.2)*ps;p.col=col;p.alpha=1;
    p.decay=.024+Math.random()*.024;p.shock=false;p.alive=true;
  }
}
function spawnSpark(x,y,col){
  const ps=W<500?.55:1;
  for(let i=0;i<7;i++){
    const a=Math.random()*Math.PI*2;
    const p=poolAcquire(particles);
    p.x=x;p.y=y;
    p.vx=Math.cos(a)*(Math.random()*3.5+1)*ps;
    p.vy=Math.sin(a)*(Math.random()*3.5+1)*ps;
    p.r=(1.2+Math.random()*1.4)*ps;p.col=col;p.alpha=1;
    p.decay=.07;p.shock=false;p.alive=true;
  }

function spawnShock(x,y,col){
  const ps=W<500?.55:1;
  const p=poolAcquire(particles);
  p.x=x;p.y=y;p.vx=0;p.vy=0;
  p.r=5*ps;p.col=col;p.alpha=.65;p.decay=.024;p.shock=true;p.alive=true;
}
function updateParticles(dt){
  for(let i=0;i<particles.length;i++){
    const p=particles[i];if(!p.alive)continue;
    if(p.shock){p.r+=2.6*dt;p.alpha-=.028*dt;}
    else{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.06*dt;p.alpha-=p.decay*dt;}
    if(p.alpha<=.01)p.alive=false;
  }
}
function drawParticles(){
  const pa=ctx.globalAlpha;
  for(let i=0;i<particles.length;i++){
    const p=particles[i];if(!p.alive)continue;
    ctx.globalAlpha=pa*p.alpha;
    if(p.shock){
      ctx.strokeStyle=p.col;ctx.lineWidth=2;
      ctx.strokeRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
    }else{
      const r=Math.max(1,Math.round(p.r));
      ctx.fillStyle=p.col;ctx.fillRect(p.x-r,p.y-r,r*2,r*2);
    }
  }
  ctx.globalAlpha=pa;
}

// ── Score popups ──────────────────────────────────────────────────────────────
function spawnScorePopup(x,y,pts,col){

function updateScorePopups(dt){

    p.y+=p.vy*dt;p.life-=dt;

}

function premiumColor(baseColor){

function buildWave(lvl){const lb=1+loopCount*.30;const maxCols=W<500?6:W<700?7:lvl.cols;const cols=Math.min(lvl.cols,maxCols);const margin=Math.round(clamp(W*.06,30,60));const maxFW=W-margin*2;const ewMax=W<500?26:40;const gxBase=Math.round(clamp(W*.018,8,16));const ew=Math.round(clamp((maxFW*.7-gxBase*(cols-1))/cols,14,ewMax));const eh=Math.round(ew*.85);spriteScale=ew/40;const gx=Math.min(Math.max(gxBase,Math.floor((maxFW-cols*ew)/(cols-1||1))),Math.round(ew*.7));const gy=Math.round(clamp(H*.025,14,24));const tw=cols*ew+(cols-1)*gx;const sx=(W-tw)/2;const hudH=W<500?60:72;const sy=hudH+18;

function showModal(){document.getElementById('modal').classList.remove('hide');}
function hideModal(){document.getElementById('modal').classList.add('hide');}
function el(id){return document.getElementById(id);}
function showLevelModal(mode){
  modalMode=mode;
  // Sincronizar visibilidad sprite desfile DOM: solo visible en estado título
  if(mode==='title'){PDE.show();}else{PDE.hide();}
  el('m-stars').style.display='none';el('m-scores').style.display='none';
  el('m-btn2-wrap').style.display='none';el('m-btn3-wrap').style.display='none';
  el('m-hi').textContent='';el('m-btn').onclick=modalAction;el('m-info').innerHTML='';
  if(mode==='title'){
    el('m-label').textContent='DRONE';
    el('m-title').textContent='DRONE';
    el('m-sub').innerHTML=t('tagline');
    el('m-btn').innerHTML=t('tap').replace('- ','').replace(' -','');
    el('m-info').innerHTML=t('autofire');
    if(hiScore>0)el('m-hi').textContent=t('best')+' '+hiScore.toLocaleString();
    el('m-scores').style.display='none';
    hideModal();state='title';return;}
  else if(mode==='complete'){
    const nxt=LEVELS[levelIdx+1];const isEnd=!nxt;
    el('m-label').innerHTML=t('sectorCleared',{n:levelIdx+1});
    if(isEnd){loopCount++;el('m-title').innerHTML=t('loopTitle',{n:loopCount});el('m-sub').innerHTML=t('allCleared');el('m-stars').style.display='flex';el('m-stars').innerHTML='';for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);};}
    else{el('m-title').textContent=nxt.name||'OVERLORD';el('m-sub').innerHTML=t('nextSector',{n:levelIdx+2});}
    el('m-btn').innerHTML=isEnd?t('continueBtn'):t('nextBtn');
  }else if(mode==='gameover'){
    el('m-label').innerHTML=t('missionFailed');el('m-title').innerHTML=t('gameOver');
    el('m-sub').innerHTML=t('sector',{n:levelIdx+1})+' — '+(LEVELS[Math.min(levelIdx,LEVELS.length-1)].name||'OVERLORD');
    el('m-scores').style.display='block';el('m-sval').textContent=score.toLocaleString();
    if(score>hiScore){hiScore=score;localStorage.setItem('galaxar_hi',hiScore);el('m-hi').textContent=t('newRecord');}
    else if(hiScore>0)el('m-hi').textContent=t('record')+' '+hiScore.toLocaleString();
    if(loopCount>0){el('m-stars').style.display='flex';el('m-stars').innerHTML='';for(let i=0;i<loopCount;i++){const s=document.createElement('span');s.className='ls';s.textContent='★';el('m-stars').appendChild(s);}}
    // Flujo: botón 1 = continuar con rewarded; botón 2 = menú principal con intersticial.
    // Si no hay rewarded, sólo se muestra menú principal con intersticial.
    canContinueWithAd=false;
    const goMenuWithAd=function(){try{window.GalaxBridge?.showInterstitial();}catch(e){}goMenu();};
    if(window.GalaxBridge?.isRewardedReady?.()){
      canContinueWithAd=true;
      el('m-btn').innerHTML=t('watchAd');
      el('m-btn').onclick=watchAdToContinue;
      el('m-btn2-wrap').style.display='block';
      el('m-btn2').innerHTML=t('mainMenu');
      el('m-btn2').onclick=goMenuWithAd;
    }else{
      el('m-btn').innerHTML=t('mainMenu');
      el('m-btn').onclick=goMenuWithAd;
    }
  }
  showModal();
}
function goMenu(){hideModal();document.getElementById('boss-wrap').classList.remove('on');document.getElementById('ctrl-btns').classList.remove('on');document.getElementById('pause-overlay').classList.remove('on');isPaused=false;PDE.show();showLevelModal('title');}
function modalAction(){
  if(modalMode==='title')startGame();
  else if(modalMode==='complete'){
    hideModal();levelIdx++;if(levelIdx>=LEVELS.length)levelIdx=0;initLevel(levelIdx);state='playing';
    levelsCompleted++;
    if(levelsCompleted>0&&levelsCompleted%5===0){
      try{window.GalaxBridge?.showInterstitial();}catch(e){}
    }
  }
  else if(modalMode==='gameover'){try{window.GalaxBridge?.showInterstitial();}catch(e){}goMenu();}
}

// va idéntica de fluida que el gameplay. Sólo se ha cambiado "GALAX" por

// Cache del logo — se regenera solo cuando cambia el tamaño
function buildLogoCache(logoSize,logoY){
  const pw=Math.round(logoSize*6.5),ph=logoSize+20;
  const nc=document.createElement('canvas');nc.width=pw;nc.height=ph;
  const c2=nc.getContext('2d');
  const PF="'Press Start 2P',monospace";
  c2.textAlign='center';c2.font=logoSize+'px '+PF;
  const cx=pw/2,cy=logoSize+2;
  // Sombra 3D escalonada
  const depth=Math.round(logoSize*0.12);
  for(let i=depth;i>0;i--){
    const alpha=0.08+(depth-i)*0.055;
    c2.fillStyle=`rgba(0,15,60,${alpha.toFixed(2)})`;
    c2.fillText('DRONE',cx+i*1.3,cy+i*1.3);
  }
  // Outline cian
  c2.fillStyle='rgba(0,180,255,0.28)';
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([ox,oy])=>c2.fillText('DRONE',cx+ox,cy+oy));
  // Gradiente vertical principal: dorado→blanco→cian→azul
  const vg=c2.createLinearGradient(0,cy-logoSize,0,cy+4);
  vg.addColorStop(0,'#ffe44d');vg.addColorStop(0.32,'#ffffff');
  vg.addColorStop(0.68,'#00e5ff');vg.addColorStop(1,'#0055bb');
  c2.fillStyle=vg;c2.fillText('DRONE',cx,cy);
  _logoCache=nc;_logoCacheW=pw;_logoCacheSize=logoSize;
}

function drawTitleScreen(){if(state!=='title')return;
const PF="'Press Start 2P',monospace";
const logoSize=W<500?30:W<800?44:60;

const eH=eBot-eTop;
const eScale=clamp(eH/100,1,2.2);
const iy=Math.max(H*.6,eBot+60);

// Reconstruir cache si cambió el tamaño
if(!_logoCache||_logoCacheSize!==logoSize)buildLogoCache(logoSize,logoY);

ctx.save();

// Halo pulsante — simple rect semitransparente, sin shadowBlur
const pulse=0.5+0.5*Math.sin(frame*0.04);
const hw=Math.round(logoSize*3.2),hh=Math.round(logoSize*1.1);
const hx=W/2-hw/2,hy=logoY-logoSize-4;

// Dibujar logo cacheado

// Scanline highlight — solo 1 franja, sin clip costoso

const scanY=logoY-logoSize+((frame*1.6|0)%(logoSize+scanH));
ctx.fillStyle=`rgba(255,255,255,0.12)`;

// Línea decorativa
if(!_titleGrad||_titleGradW!==W){
  _titleGrad=ctx.createLinearGradient(W/2-150,0,W/2+150,0);
  _titleGrad.addColorStop(0,'transparent');
  _titleGrad.addColorStop(0.28,'#ffe44d');
  _titleGrad.addColorStop(0.5,'#ffffff');
  _titleGrad.addColorStop(0.72,'#00e5ff');
  _titleGrad.addColorStop(1,'transparent');

// ── Title screen — fondo y estrellas en vivo (como gameplay), logo cacheado ──
// Hipótesis: gameplay va fluido porque después del fondo solo hay operaciones
// pequeñas y localizadas (enemigos ~40px, balas, partículas). El título
// repintaba cada frame un logo masivo con sombras, 4 contornos y gradientes,
// lo cual invalida una región grande del canvas y afecta al resto del render.
// Solución: cachear el logo+textos estáticos en un bitmap pequeño (ancho
// completo pero solo la zona del título, ~200px de alto) y blittearlo.
function buildTitleLogoCache(){
  const PF="'Press Start 2P',monospace";
  // ── Logo DRONE — pixel-art arcade clásico ───────────────────────────────
  // Bitmap 5×7 por letra, separación 1px = 6px por letra.
  // DRONE = 5 letras × 6 - 1 = 29 unidades de ancho × 7 de alto.
  // Bitmaps: 1 = pixel lleno, 0 = vacío
  const FONT={
    G:["11111","10000","10011","10001","10001","11111","00000"],
    A:["01110","10001","10001","11111","10001","10001","00000"],
    L:["10000","10000","10000","10000","10000","11111","00000"],
    X:["10001","10001","01010","00100","01010","10001","00000"],
    D:["11110","10001","10001","10001","10001","11110","00000"],
    R:["11110","10001","10001","11110","10010","10001","00000"],
    O:["01110","10001","10001","10001","10001","01110","00000"],
    N:["10001","11001","10101","10011","10001","10001","00000"],
    E:["11111","10000","11110","10000","10000","11111","00000"],
  };
  const WORD='DRONE';
  // Escala del pixel según pantalla — más grande = letra más chunky
  const px=W<500?6:W<800?8:10;
  const letterW=5,letterH=7,gap=1;
  const wordW=WORD.length*(letterW+gap)-gap; // 29
  const logoPxW=wordW*px;
  const logoPxH=letterH*px;
  // Margen para el borde oscuro (1px por cada lado) + highlight superior
  const borderPx=1;
  const bmpW=W;
  // Altura del bitmap: logo + subtítulo + record con margen
  const logoY=72; // top del logo (en coords CSS)
  const TS=W<500?9:11;
  const subY=logoY+logoPxH+28;
  const hiY=subY+24;
  const bmpH=hiY+12;

  const nc=document.createElement('canvas');
  nc.width=W;nc.height=bmpH;
  const c2=nc.getContext('2d');
  c2.imageSmoothingEnabled=false;

  // Posición horizontal del logo (centrado)
  const startX=Math.round((W-logoPxW)/2);

  // Paleta arcade clásica: amarillo brillante + rojo + blanco highlight + sombra oscura
  const COL_MAIN='#ffcc00';    // amarillo arcade
  const COL_HIGHLIGHT='#ffff88'; // highlight superior
  const COL_SHADOW='#993300';  // borde rojo oscuro
  const COL_GLINT='#ffffff';   // pequeños destellos blancos

  // ── Paso 1: sombra/borde oscuro (offset 1px abajo-derecha + contorno) ───
  c2.fillStyle=COL_SHADOW;
  for(let l=0;l<WORD.length;l++){
    const bm=FONT[WORD[l]];
    const lx=startX+l*(letterW+gap)*px;
    for(let y=0;y<letterH;y++){
      const row=bm[y];
      for(let x=0;x<letterW;x++){
        if(row[x]==='1'){
          // Borde: dibujar un pixel desplazado en 8 direcciones (contorno)
          c2.fillRect(lx+x*px-borderPx,logoY+y*px,px+borderPx*2,px+borderPx*2);
        }
      }
    }
  }

  // ── Paso 2: cuerpo principal en amarillo ─────────────────────────────
  c2.fillStyle=COL_MAIN;
  for(let l=0;l<WORD.length;l++){
    const bm=FONT[WORD[l]];
    const lx=startX+l*(letterW+gap)*px;
    for(let y=0;y<letterH;y++){
      const row=bm[y];
      for(let x=0;x<letterW;x++){
        if(row[x]==='1'){
          c2.fillRect(lx+x*px,logoY+y*px,px,px);
        }
      }
    }
  }

  // ── Paso 3: highlight superior (primer tercio en amarillo claro) ─────
  c2.fillStyle=COL_HIGHLIGHT;
  for(let l=0;l<WORD.length;l++){
    const bm=FONT[WORD[l]];
    const lx=startX+l*(letterW+gap)*px;
    // Solo las filas 0 y 1 si están activas, y solo un pedazo
    for(let y=0;y<2;y++){
      const row=bm[y];
      for(let x=0;x<letterW;x++){
        if(row[x]==='1'){
          // Línea superior de cada pixel (hace efecto de gradiente arcade)
          c2.fillRect(lx+x*px,logoY+y*px,px,Math.max(1,Math.round(px*0.4)));
        }
      }
    }
  }

  // ── Paso 4: destellos (pequeños pixels blancos en esquinas clave) ────
  // Un "glint" en la esquina superior-izquierda de la primera letra,
  // típico de los logos arcade que simulan reflejo metálico.
  c2.fillStyle=COL_GLINT;
  // Glint en G (letra 0): arriba-izquierda
  c2.fillRect(startX+0*px,logoY+0*px,px,px);
  c2.fillRect(startX+1*px,logoY+0*px,px,Math.round(px*0.5));

  // ── Línea decorativa debajo del logo ──────────────────────────────────
  const lineY=logoY+logoPxH+6;
  const lineW=logoPxW+20;
  const lineX=Math.round((W-lineW)/2);
  // Línea principal rojo
  c2.fillStyle=COL_SHADOW;
  c2.fillRect(lineX,lineY,lineW,2);
  // Línea superior amarilla más fina
  c2.fillStyle=COL_MAIN;
  c2.fillRect(lineX+4,lineY-1,lineW-8,1);

  // ── Subtítulo ──────────────────────────────────────────────────────────
  c2.textAlign='center';
  c2.font=TS+'px '+PF;
  c2.fillStyle='rgba(255,220,130,.9)';
  c2.fillText(t('tagline'),W/2,subY);
  if(hiScore>0){
    c2.fillStyle='#ffcc00';
    c2.fillText(t('best')+' '+hiScore.toLocaleString(),W/2,hiY);
  }

  _titleLogoCache=nc;
  _titleLogoKey=W+'@'+hiScore;
}

// ── Suspend/resume del AudioContext ────────────────────────────────────────────
// Cuando la app pierde foco (anuncio AdMob, pantalla apagada, app en background,
// llamada entrante), el AudioContext sigue procesando osciladores en su thread
// propio aunque el rAF esté suspendido. Para silenciar TODO el audio
// instantáneamente, suspendemos el AudioContext entero. Es la API estándar de
// Web Audio para este caso.
window.suspendAudio=function(){
  try{
    if(AC&&AC.state==='running')AC.suspend();
  }catch(e){}
};
window.resumeAudio=function(){
  try{
    if(AC&&AC.state==='suspended')AC.resume();
  }catch(e){}
};

// Visibilitychange: pausar juego y suspender audio cuando la pestaña/app
// pasa a background (incluye fullscreen ads).
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(state==='playing'&&!isPaused)togglePause();
    window.suspendAudio();
  }else{
    window.resumeAudio();
  }
});

}

function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

// ── Game loop ─────────────────────────────────────────────────────────────────
let _lastT=null,_lastDt=1;
// Debug flags opcionales via URL:
//   ?debug=1 → overlay de FPS/jitter
//   ?spd=N   → velocidad del desfile (default 2)
const _URL_PARAMS=new URLSearchParams(location.search);
const DEBUG=_URL_PARAMS.get('debug')==='1';
const PARADE_SPD=parseFloat(_URL_PARAMS.get('spd'))||2;
// Stats para overlay debug
const _dtHist=new Array(60).fill(16.667);let _dtHi=0;
// Acumulador de tiempo para cap a 60fps independiente del refresh rate.
// El juego está diseñado para 60fps (algunas animaciones son frame-based),
// así que descartamos frames si no han pasado al menos 16ms desde el último
// procesado. Funciona en cualquier panel (60Hz natural, 90Hz, 120Hz LTPO).
let _accTime=0;

function loop(ts){
  requestAnimationFrame(loop);
  if(_lastT===null){_lastT=ts;return;}
  const dtMs=ts-_lastT;
  _lastT=ts;
  _accTime+=dtMs;
  // Si no llegamos a 16ms acumulados, descartar este frame.
  // 16ms ≈ 60fps. En panel 120Hz acumula 2 frames y procesa uno.
  // En panel 60Hz procesa todos. En 90Hz procesa la mayoría.
  if(_accTime<16)return;
  // Cap del acumulador para evitar saltos enormes si la pestaña estuvo
  // en background (no queremos procesar 5 segundos de lógica de golpe).
  if(_accTime>50)_accTime=16;
  const dt=Math.min(_accTime/16.667,3);
  _accTime=0;
  _lastDt=dt;
  if(DEBUG){_dtHist[_dtHi]=dtMs;_dtHi=(_dtHi+1)%60;}
  update(dt);
  render();
  if(DEBUG)drawDebugOverlay();
}
function drawDebugOverlay(){
  // Calcular media y varianza (std dev) del tiempo entre frames
  let sum=0,max=0,min=1e9;
  for(const v of _dtHist){sum+=v;if(v>max)max=v;if(v<min)min=v;}
  const avg=sum/_dtHist.length;
  let varSum=0;for(const v of _dtHist)varSum+=(v-avg)*(v-avg);
  const stddev=Math.sqrt(varSum/_dtHist.length);
  const fps=1000/avg;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(4,4,180,70);
  ctx.font="10px 'Press Start 2P',monospace";ctx.fillStyle='#0f0';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('FPS '+fps.toFixed(1),10,10);
  ctx.fillText('dt  '+avg.toFixed(1)+'ms',10,26);
  ctx.fillText('jit '+stddev.toFixed(2),10,42);
  ctx.fillStyle=max-min>8?'#f33':'#0f0';
  ctx.fillText('max '+(max-min).toFixed(1),10,58);
  ctx.restore();
}
function handleTitleTap(e){if(state!=='title')return;if(e.target.id==='m-btn'||e.target.classList.contains('m-btn'))return;startGame();}
C.addEventListener('click',handleTitleTap);
C.addEventListener('touchend',handleTitleTap,{passive:true});

// ── Init ──────────────────────────────────────────────────────────────────────
score=0;lives=3;loopCount=0;levelIdx=0;frame=0;
initBg();initPlayer();
// NO reasignamos bullets/eBullets/particles/scorePopups: son pools pre-alocados.
// powerups/enemies son arrays normales, esos sí se vacían.
enemies=[];powerups=[];
mX=W/2;mY=H-80;initParade();PDE.init();PDE.show();
document.fonts.ready.then(()=>showLevelModal('title')).catch(()=>showLevelModal('title'));
requestAnimationFrame(loop);
