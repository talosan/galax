<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALAX – Deep Space Warfare</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #060d1a;
      color: #d0d8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #4db8ff;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(77,184,255,0.5);
    }
    .tagline {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #3a5070;
      margin-bottom: 48px;
    }
    .desc {
      max-width: 480px;
      text-align: center;
      font-size: 16px;
      color: #8090b0;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: #4db8ff;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 6px;
      text-decoration: none;
      margin-bottom: 60px;
    }
    .btn:hover { background: #88ddff; }
    .links {
      display: flex;
      gap: 32px;
      font-size: 13px;
    }
    .links a { color: #3a5070; text-decoration: none; }
    .links a:hover { color: #4db8ff; }
    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #2a3a55;
    }
  </style>
</head>
<body>
  <div class="logo">GALAX</div>
  <div class="tagline">Deep Space Warfare</div>
  <p class="desc">
    A classic arcade space shooter for Android. Battle through 10 sectors and defeat the OVERLORD.
    Available on Google Play.
  </p>
  <a class="btn" href="https://play.google.com/store/apps/details?id=com.galax.automotive">Get it on Google Play</a>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
  </div>
  <footer>&copy; 2026 Tap Tap Droid</footer>
</body>
</html>
